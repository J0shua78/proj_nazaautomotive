<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects - Sky Lounge Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* CSS Variables */
    :root {
        --primary: #2c7be5;
        --secondary: #6e84a3;
        --success: #00a65a;
        --info: #39afd1;
        --warning: #f39c12;
        --danger: #e63757;
        --light: #f9fafd;
        --dark: #12263f;
        --gray: #95aac9;
        --light-gray: #edf2f9;
        --border-color: #e3ebf6;
        --success-dark: #008d4c;
        --warning-dark: #e08e0b;
        --danger-dark: #d33724;
    }

    /* Base Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /*font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;*/
        font-family:  "Helvetica Neue",Helvetica,Arial,sans-serif;
    }

    body {
        background-color: var(--light);
        color: var(--dark);
        padding: 0px 10px 10px 10px;
        font-size: 14px;
        line-height: 1.5;
    }

    /* Table Styles */
    .table-responsive {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background-color: white;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
    }

    table th,
    table td {
        padding: 7px 11px;
        text-align: left;
        vertical-align: middle;
        border-bottom: 1px solid var(--border-color);
    }

    table th {
        background-color: var(--light-gray);
        color: var(--dark);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        position: relative;
        cursor: pointer;
        user-select: none;
    }

    table td {
        font-size: 13px;
    }

    table th.sortable:hover {
        background-color: rgba(44, 123, 229, 0.06);
    }

    table th.sortable::after {
        content: "\f0dc";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        color: var(--gray);
        transition: color 0.2s;
    }
    
    table th.sortable.sort-asc::after {
        content: "\f0de";
        color: var(--primary);
    }

    table th.sortable.sort-desc::after {
        content: "\f0dd";
        color: var(--primary);
    }

    table th.sort-asc::after,
    table th.sort-desc::after {
        border: none;
        width: auto;
        height: auto;
    }

    table tr:last-child td {
        border-bottom: none;
    }

    table tr:hover td {
        background-color: rgba(44, 123, 229, 0.03);
    }

    /* Status Badges */
    /*.status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        min-width: 65px;
        text-align: center;
    }*/

    /* CRM Status Badges */
.status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    min-width: 100px;
    text-align: center;
    /*text-transform: uppercase;*/
}

.status-new { background: #e0f2fe; color: #0369a1; }        /* Sky Blue */
.status-contacted { background: #fef3c7; color: #b45309; }  /* Amber */
.status-qualified { background: #dcfce7; color: #15803d; }  /* Emerald */
.status-in-progress { background: #ede9fe; color: #6d28d9; }/* Violet */
.status-converted { background: #d1fae5; color: #065f46; }  /* Teal */
.status-lost-closed { background: #fee2e2; color: #991b1b; } /* Red */

    .status-badge.active {
        background-color: rgba(0, 166, 90, 0.1);
        color: var(--success-dark);
        border: 1px solid rgba(0, 166, 90, 0.2);
    }

    .status-badge.pending {
        background-color: rgba(243, 156, 18, 0.1);
        color: var(--warning-dark);
        border: 1px solid rgba(243, 156, 18, 0.2);
    }

    .status-badge.expired {
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger-dark);
        border: 1px solid rgba(230, 55, 87, 0.2);
    }

    /* Action Buttons */
    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        font-size: 11px;
        border-radius: 50%;
        border: none;
        background-color: transparent;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 3px;
        color: var(--gray);
    }

    .action-btn:hover {
        transform: translateY(-1px);
        color: var(--dark);
    }

    .action-btn.view:hover {
        color: var(--success-dark);
    }

    .action-btn.edit:hover {
        color: var(--warning-dark);
    }

    .action-btn.delete:hover {
        color: var(--danger-dark);
    }

    .action-btn.add {
        background-color: var(--primary);
        color: white;
        width: auto;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
    }

    /* Filter Controls */
    .filter-container {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 8px 0;
        align-items: center;
    }

    .search-box {
        position: relative;
        flex: 1;
        min-width: 200px;
    }

    .search-box input {
        width: 100%;
        padding: 6px 12px 6px 32px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        transition: all 0.2s;
        height: 32px;
    }

    .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 0.2rem rgba(44, 123, 229, 0.25);
        outline: none;
    }

    .search-box i {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: var(--gray);
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .filter-group label {
        font-size: 13px;
        color: var(--dark);
        font-weight: 500;
    }

    .filter-group select {
        padding: 6px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        min-width: 120px;
        height: 32px;
    }

    /* Card Layout */
    .card {
        background-color: white;
        border-radius: 6px;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
        margin-bottom: 20px;
        overflow: hidden;
    }

    .card-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .card-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--dark);
    }

    .card-body {
        padding: 16px;
    }

    .card-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border-color);
        background-color: var(--light-gray);
    }

    /* Pagination Controls */
    .pagination-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .pagination button {
        padding: 5px 10px;
        border: 1px solid var(--border-color);
        background-color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        min-width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .pagination button.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .pagination button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .page-info {
        padding: 0 8px;
    }

    /* Items Per Page Selector */
    .items-per-page {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .items-per-page label {
        font-size: 13px;
        color: var(--dark);
    }

    .items-per-page select {
        padding: 5px 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        height: 32px;
    }

    /* Table Summary */
    .table-summary {
        display: flex;
        align-items: center;
        height: 100%;
        font-size: 13px;
        color: var(--gray);
    }

    /* Iframe Overlay */
    .iframe-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
    }

    .iframe-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 900px;
        height: 90%;
        max-height: 700px;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    #object-form-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- START OF CHANGES --- */
    .iframe-close {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: var(--secondary);
        color: white;
        border: 1px solid var(--secondary);
        width: auto;
        height: auto;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        gap: 4px;
        text-transform: uppercase;
        font-weight: 500;
        transition: all 0.2s;
    }

    .iframe-close:hover {
        background-color: rgba(110, 132, 163, 0.8);
        border-color: rgba(110, 132, 163, 0.8);
    }
    
    .object-id-link {
        color: var(--primary);
        text-decoration: underline;
        cursor: pointer;
        transition: color 0.2s;
    }

    .object-id-link:hover {
        color: var(--dark);
    }
    /* --- END OF CHANGES --- */


    /* Loading Indicator */
    .loading-container {
        display: none;
        text-align: center;
        padding: 40px 0;
    }

    .loading-spinner {
        display: inline-block;
        width: 30px;
        height: 30px;
        border: 3px solid rgba(44, 123, 229, 0.2);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Error Message */
    .error-container {
        display: none;
        padding: 12px 16px;
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger);
        border-radius: 4px;
        margin-bottom: 16px;
        font-size: 13px;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
        .filter-container {
            flex-direction: column;
            align-items: stretch;
        }
        
        .search-box {
            min-width: 100%;
        }
        
        .pagination-container {
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        
        .items-per-page {
            order: -1;
        }
    }

    @media (max-width: 576px) {
        body {
            padding: 0px 10px 10px 10px;
        }
        
        .card-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        
        .table-summary {
            width: 100%;
            justify-content: flex-end;
        }


    }

    font-family:  "Helvetica Neue",Helvetica,Arial,sans-serif;
    font-variant-numeric: tabular-nums;
    /* Ensures consistent formatting */
    white-space: pre; /* Preserves spacing exactly */
}


</style>

        let objects = [...mockObjectsData];

        function mockGetObjects() {
            return { success: true, data: objects };
        }

        function mockGetObjectDetails(id) {
            const object = objects.find(m => m.id === id);
            return { success: !!object, data: object };
        }

        function mockAddObject(objectData) {
            const newObject = { ...objectData, id: String(objects.length + 1) };
            objects.push(newObject);
            return { success: true, data: newObject };
        }

        function mockUpdateObject(id, objectData) {
            const index = objects.findIndex(m => m.id === id);
            if (index !== -1) {
                objects[index] = { ...objects[index], ...objectData };
                return { success: true, data: objects[index] };
            }
            return { success: false, error: 'Object not found' };
        }

        function mockDeleteObject(id) {
            const initialLength = objects.length;
            objects = objects.filter(m => m.id !== id);
            return { success: objects.length < initialLength };
        }
        
        // js/config.js
        const config = {
            useMockData: true,
            apiBaseUrl: 'http://localhost:3000/api'
        };

        // js/services/objectService.js
        async function fetchObjects() {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockGetObjects());
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/objects`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Network error',
                    fallbackData: mockGetObjects().data
                };
            }
        }

        async function fetchObjectDetails(id) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockGetObjectDetails(id));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/objects/${id}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to fetch object details',
                    fallbackData: mockGetObjectDetails(id).data
                };
            }
        }

        async function addObject(objectData) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockAddObject(objectData));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/objects`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(objectData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to add object'
                };
            }
        }

        async function updateObject(id, objectData) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockUpdateObject(id, objectData));
                    }, 300);
                    });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/objects/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(objectData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to update object'
                };
            }
        }

        async function deleteObject(id) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockDeleteObject(id));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/objects/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to delete object'
                };
            }
        }

        // js/pages/objects.js
        class ObjectsController {
            constructor() {
                this.elements = {
                    loading: document.getElementById('loading-objects'),
                    error: document.getElementById('error-objects'),
                    addObjectBtn: document.getElementById('add-object'),
                    searchInput: document.getElementById('search-objects'),
                    statusFilter: document.getElementById('filter-status'),
                    itemsPerPage: document.getElementById('items-per-page'),
                    objectsTable: document.getElementById('objectsTable'),
                    tableBody: document.querySelector('#objectsTable tbody'),
                    tableSummary: document.getElementById('table-summary'),
                    pagination: document.getElementById('pagination'),
                    prevPageBtn: document.getElementById('prev-page'),
                    nextPageBtn: document.getElementById('next-page'),
                    pageInfo: document.getElementById('page-info'),
                    iframeOverlay: document.getElementById('iframe-overlay'),
                    iframeClose: document.getElementById('iframe-close'),
                    objectFormIframe: document.getElementById('object-form-iframe')
                };

                this.state = {
                    currentPage: 1,
                    itemsPerPage: 10,
                    totalItems: 0,
                    allObjects: [],
                    filteredObjects: [],
                    displayedObjects: [],
                    sortField: 'objectId',
                    sortDirection: 'asc'
                };

                this.bindEvents();
                this.initialize();
            }

            bindEvents() {
                // Add object button
                if (this.elements.addObjectBtn) {
                    this.elements.addObjectBtn.addEventListener('click', () => {
                        this.openObjectForm();
                    });
                }

                // Iframe close button
                if (this.elements.iframeClose) {
                    this.elements.iframeClose.addEventListener('click', () => {
                        this.closeObjectForm();
                    });
                }

                // Search and filter events
                if (this.elements.searchInput) {
                    this.elements.searchInput.addEventListener('input', () => {
                        this.filterObjects();
                    });
                }

                if (this.elements.statusFilter) {
                    this.elements.statusFilter.addEventListener('change', () => {
                        this.filterObjects();
                    });
                }

                if (this.elements.itemsPerPage) {
                    this.elements.itemsPerPage.addEventListener('change', () => {
                        this.state.itemsPerPage = parseInt(this.elements.itemsPerPage.value);
                        this.state.currentPage = 1;
                        this.updateDisplay();
                    });
                }

                // Pagination
                if (this.elements.prevPageBtn) {
                    this.elements.prevPageBtn.addEventListener('click', () => {
                        this.prevPage();
                    });
                }

                if (this.elements.nextPageBtn) {
                    this.elements.nextPageBtn.addEventListener('click', () => {
                        this.nextPage();
                    });
                }

                // Table sorting
                document.querySelectorAll('.sortable').forEach(header => {
                    header.addEventListener('click', () => {
                        const field = header.dataset.sort;
                        if (this.state.sortField === field) {
                            this.state.sortDirection = this.state.sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            this.state.sortField = field;
                            this.state.sortDirection = 'asc';
                        }

                        // Update sort indicators
                        document.querySelectorAll('.sortable').forEach(h => {
                            h.classList.remove('sort-asc', 'sort-desc');
                        });

                        header.classList.add(`sort-${this.state.sortDirection}`);

                        this.filterObjects();
                    });
                });

                // Event delegation for object ID link
                if (this.elements.tableBody) {
                    this.elements.tableBody.addEventListener('click', (e) => {
                        const objectIdLink = e.target.closest('.object-id-link');
                        const row = e.target.closest('tr');
                        const id = row?.dataset.id;
                        
                        if (!id) return;

                        if (objectIdLink) {
                            this.openObjectForm(id, 'view');
                        }
                    });
                }

                // Listen for messages from iframe
                window.addEventListener('message', (e) => {
                    if (e.data.type === 'OBJECT_FORM_CLOSE') {
                        this.closeObjectForm();
                    }
                    if (e.data.type === 'OBJECT_FORM_SAVED') {
                        this.closeObjectForm();
                        this.loadObjects();
                    }
                    if (e.data.type === 'OBJECT_FORM_LOADED') {
                        // Hide the iframe close button when form is loaded
                        this.elements.iframeClose.style.display = 'none';
                    }
                });
            }

            openObjectForm(id = null, mode = 'add') {
                let url = 'object-form.html';
                if (id) {
                    url += `?id=${id}&mode=${mode}`;
                } else {
                    url += '?mode=add';
                }

                this.elements.objectFormIframe.src = url;
                this.elements.iframeOverlay.style.display = 'block';
            }

            closeObjectForm() {
                this.elements.iframeOverlay.style.display = 'none';
                this.elements.objectFormIframe.src = '';
            }

            async initialize() {
                await this.loadObjects();
                // Set initial sort indicator
                const initialHeader = document.querySelector(`.sortable[data-sort="${this.state.sortField}"]`);
                if (initialHeader) {
                    initialHeader.classList.add(`sort-${this.state.sortDirection}`);
                }
            }

            async loadObjects() {
                try {
                    this.showLoading();
                    const { data: objects, success } = await fetchObjects();

                    if (success && objects) {
                        this.state.allObjects = objects;
                        this.state.totalItems = objects.length;
                        this.filterObjects();
                    } else {
                        throw new Error('Failed to load objects');
                    }
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            filterObjects() {
                const searchTerm = this.elements.searchInput?.value.toLowerCase() || '';
                const statusFilter = this.elements.statusFilter?.value || '';

                // Filter objects
                this.state.filteredObjects = this.state.allObjects.filter(object => {
                    const matchesSearch =
                        object.name.toLowerCase().includes(searchTerm) ||
                        (object.vehicleInterest && object.vehicleInterest.toLowerCase().includes(searchTerm)) ||
                        (object.mobileNo && object.mobileNo.toLowerCase().includes(searchTerm)) ||
                        object.objectId.toLowerCase().includes(searchTerm);

                    const matchesStatus = statusFilter ? object.status === statusFilter : true;

                    return matchesSearch && matchesStatus;
                });

                // Sort objects
                this.state.filteredObjects.sort((a, b) => {
                    let valueA = a[this.state.sortField];
                    let valueB = b[this.state.sortField];

                    // Handle dates
                    if (this.state.sortField === 'joinDate') {
                        valueA = new Date(valueA);
                        valueB = new Date(valueB);
                    }

                    // Handle case-insensitive string comparison
                    if (typeof valueA === 'string') valueA = valueA.toLowerCase();
                    if (typeof valueB === 'string') valueB = valueB.toLowerCase();

                    if (valueA < valueB) return this.state.sortDirection === 'asc' ? -1 : 1;
                    if (valueA > valueB) return this.state.sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                this.state.totalItems = this.state.filteredObjects.length;
                this.state.currentPage = 1;
                this.updateDisplay();
            }

            updateDisplay() {
                // Calculate pagination
                const startIdx = (this.state.currentPage - 1) * this.state.itemsPerPage;
                const endIdx = startIdx + this.state.itemsPerPage;
                this.state.displayedObjects = this.state.filteredObjects.slice(startIdx, endIdx);

                // Update table
                this.renderObjects();

                // Update pagination controls
                this.updatePagination();

                // Update summary
                if (this.elements.tableSummary) {
                    const total = this.state.filteredObjects.length;
                    const start = total > 0 ? startIdx + 1 : 0;
                    const end = Math.min(endIdx, total);
                    this.elements.tableSummary.textContent = `Showing ${start}-${end} of ${total}`;
                }
            }

            renderObjects() {
    const tbody = this.elements.objectsTable?.querySelector('tbody');
    if (!tbody) return;

    tbody.innerHTML = this.state.displayedObjects.map((object, index) => {
        const rowNum = ((this.state.currentPage - 1) * this.state.itemsPerPage) + index + 1;
        
        return `
            <tr data-id="${object.id}">
                <td>${rowNum}</td>
                <td><a href="#" class="object-id-link">${object.objectId}</a></td>
                <td>${object.name}</td>
                <td>${object.mobileNo || 'N/A'}</td>
                <td>${object.vehicleInterest || 'N/A'}</td>
                <td class="monospace-numbers">${object.createDate ? new Date(object.createDate).toLocaleDateString() : 'N/A'}</td>
                <td>${this.getStatusBadge(object.status)}</td>
            </tr>
        `;
    }).join('');
}

            updatePagination() {
                if (!this.elements.pagination) return;

                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);

                this.elements.prevPageBtn.disabled = this.state.currentPage <= 1;
                this.elements.nextPageBtn.disabled = this.state.currentPage >= totalPages;

                if (this.elements.pageInfo) {
                    this.elements.pageInfo.textContent = `Page ${this.state.currentPage} of ${totalPages}`;
                }
            }

            prevPage() {
                if (this.state.currentPage > 1) {
                    this.state.currentPage--;
                    this.updateDisplay();
                }
            }

            nextPage() {
                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);
                if (this.state.currentPage < totalPages) {
                    this.state.currentPage++;
                    this.updateDisplay();
                }
            }

            /*getStatusBadge(status) {
                const badges = {
                    active: 'active',
                    pending: 'pending',
                    expired: 'expired'
                };
                const badgeClass = badges[status] || 'pending';
                const displayText = status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown';
                return `<span class="status-badge ${badgeClass}">${displayText}</span>`;
            }*/

            // Add this inside the ObjectsController class
            getStatusBadge(status) {
                // Normalize status to match CSS class naming convention
                const className = status.toLowerCase().replace(' / ', '-').replace(' ', '-');
                
                return `<span class="status-badge status-${className}">${status}</span>`;
            }

            showLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'block';
                }
                if (this.elements.error) {
                    this.elements.error.style.display = 'none';
                }
            }

            hideLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'none';
                }
            }

            showError(message) {
                if (this.elements.error) {
                    this.elements.error.textContent = message || 'An unknown error occurred';
                    this.elements.error.style.display = 'block';
                }
            }
        }

        // Initialize controller
        document.addEventListener('DOMContentLoaded', () => {
            new ObjectsController();
        });
    </script>
