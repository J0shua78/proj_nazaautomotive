<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix CRM - Create New Lead</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --px-bg: #f9fafd;
            --px-card-bg: #ffffff;
            --px-border: #d8e2ef;
            --px-primary: #3874ff;
            --px-primary-focus: rgba(56, 116, 255, 0.2);
            --px-text-main: #232e3e;
            --px-text-label: #8da1b9;
            --px-text-static: #5e6e82;
            --px-placeholder: #a5b0be;
            --px-danger: #f33923;
            --px-success: #00d27a;
            --px-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);

            --input-height: 2.7rem;
            --input-padding-x: 0.75rem;
            --grid-gap: 0.8rem;
            --base-font: 0.82rem;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: var(--px-bg);
            color: var(--px-text-main);
            margin: 0;
            padding: 0.5rem;
            padding-bottom: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h2 {
            font-weight: 800;
            font-size: 1.15rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .card {
            background: var(--px-card-bg);
            border: 1px solid var(--px-border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            box-shadow: var(--px-shadow);
        }

        .section-divider {
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--px-text-main);
            margin: 1.8rem 0 1rem 0;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--px-border);
        }

        .section-divider:first-child {
            margin-top: 0;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--grid-gap);
            margin-bottom: 0.4rem;
        }

        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-9 { grid-column: span 9; }
        .col-12 { grid-column: span 12; }.col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-8-12 { grid-column: span 8; }
        @media (max-width: 768px) { .col-8-12 { grid-column: span 12; } }
        @media (max-width: 500px) { .col-8-12 { grid-column: span 12; } }
        .col-9 { grid-column: span 9; }
        .col-12 { grid-column: span 12; }
        .col-32 { grid-column: span 4; }
        @media (max-width: 768px) { .col-32 { grid-column: span 6; } }
        .col-321 { grid-column: span 4; }
        @media (max-width: 768px) { .col-321 { grid-column: span 6; } }
        @media (max-width: 500px) { .col-321 { grid-column: span 12; } }
        .col-432 { grid-column: span 3; }
        @media (max-width: 768px) { .col-432 { grid-column: span 4; } }
        @media (max-width: 500px) { .col-432 { grid-column: span 6; } }



        .form-floating {
            position: relative;
        }

        .form-floating input,
        .form-floating select {
            display: block;
            width: 100%;
            height: var(--input-height);
            padding: 1.1rem var(--input-padding-x) 0.2rem;
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 700;
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            transition: all 0.2s;
            box-sizing: border-box;
            appearance: none;
        }

        /* Placeholder Logic */
        .form-floating input::placeholder {
            color: var(--px-placeholder);
            font-style: italic;
            /* ADDED: Placeholder with italic */
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .form-floating input:focus::placeholder {
            opacity: 1;
        }

        .form-floating select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 10px 8px;
        }

        .form-floating label {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            height: 100%;
            padding: 0.8rem 0;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
            color: var(--px-text-static);
            font-size: var(--base-font);
            transform-origin: 0 0;
        }

        /* Fix for date input label */
        .form-floating input[type="date"]:focus~label,
        .form-floating input[type="date"]:valid~label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 600;
            color: var(--px-text-label);
        }

        /* Ensure labels don't get stuck if the browser autofills the input */
        input:-webkit-autofill~label,
        input:-webkit-autofill:focus~label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700;
        }

        .form-floating input:focus~label,
        .form-floating input:not(:placeholder-shown)~label,
        .form-floating select:focus~label,
        .form-floating select:not([value=""])~label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700;
            color: var(--px-text-label);
        }

        .form-floating input:focus,
        .form-floating select:focus {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.18rem var(--px-primary-focus);
        }

        .btn {
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            padding: 0.5rem 1rem;
            font-size: 0.78rem;
            border-radius: 0.3rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--px-primary);
            color: #fff;
        }

        .btn-outline {
            background: #fff;
            border: 1px solid var(--px-border);
            color: var(--px-text-static);
        }

        .readonly-field {
            background-color: #f8f9fb !important;
            color: #7a828e !important;
        }

        .error-text {
            color: var(--px-danger);
            font-size: 0.7rem;
            font-weight: 700;
            display: none;
            margin-top: 2px;
            margin-left: 5px;
        }

        .is-invalid {
            border-color: var(--px-danger) !important;
        }

        /* Ensure all input types, textarea, and select show red border when invalid */
        input.is-invalid,
        select.is-invalid,
        textarea.is-invalid {
            border-color: var(--px-danger) !important;
            box-shadow: 0 0 0 0.18rem rgba(243,57,35,0.12);
        }

        /* Highlight fieldset for file, color, range, radio, checkbox when invalid */
        fieldset.input-fieldset.is-invalid {
            border-color: var(--px-danger) !important;
            box-shadow: 0 0 0 0.18rem rgba(243,57,35,0.12);
        }

        /* Highlight dropdown-checkbox-btn when invalid */
        .dropdown-checkbox-btn.is-invalid {
            border-color: var(--px-danger) !important;
            box-shadow: 0 0 0 0.18rem rgba(243,57,35,0.12);
        }
        /* --- Consistent style for radio and checkbox --- */
        .input-group-row,
        .input-group-checkbox {
            display: flex;
            align-items: center;
            min-height: var(--input-height);
            height: auto;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            background: #fff;
            padding: 0.4rem 0.75rem;
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 700;
            margin-bottom: 0.4rem;
            box-sizing: border-box;
            gap: 0.5rem 1.5rem;
            position: relative;
            flex-wrap: wrap;
        }

        .input-group-row label,
        .input-group-checkbox label {
            margin: 0;
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 400;
            display: flex;
            align-items: flex-start;
            gap: 0.4em;
            cursor: pointer;
            position: relative;
            /* Prevent overlap */
            min-width: 0;
            flex: 0 1 auto;
            white-space: normal;
        }

        .input-group-row input[type="radio"],
        .input-group-checkbox input[type="checkbox"] {
            width: 1.1em;
            height: 1.1em;
            accent-color: var(--px-primary);
            margin: 0.2em 0.4em 0 0;
            vertical-align: middle;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* Fix for floating label with custom group */
        .form-floating.input-group-float {
            padding: 0;
            height: var(--input-height);
            margin-bottom: 0.4rem;
            position: relative;
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-floating.input-group-float:focus-within {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.18rem var(--px-primary-focus);
        }

        .form-floating.input-group-float>.input-group-row,
        .form-floating.input-group-float>.input-group-checkbox {
            border: none;
            padding: 1.1rem var(--input-padding-x) 0.2rem;
            height: 100%;
            background: transparent;
            margin-bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .form-floating.input-group-float>label {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            height: 100%;
            display: flex;
            align-items: center;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
            color: var(--px-text-static);
            font-size: var(--base-font);
            transform-origin: 0 0;
            background: transparent;
            z-index: 1;
        }

        .form-floating.input-group-float:focus-within>label,
        .form-floating.input-group-float.filled>label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700;
            color: var(--px-text-label);
        }

        /* --- Consistent style for textarea --- */
        .form-floating textarea {
            display: block;
            width: 100%;
            height: var(--input-height);
            min-height: var(--input-height);
            max-height: 8rem;
            padding: 1.1rem var(--input-padding-x) 0.2rem;
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 700;
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            transition: all 0.2s;
            box-sizing: border-box;
            resize: vertical;
        }
        /* Add row-2 style for textarea */
        .form-floating textarea.row-2 {
            height: calc(var(--input-height) * 2 + 0.5rem);
            min-height: calc(var(--input-height) * 2 + 0.5rem);
            max-height: 12rem;
        }

        .form-floating textarea::placeholder {
            color: var(--px-placeholder);
            font-style: italic;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .form-floating textarea:focus::placeholder {
            opacity: 1;
        }

        .form-floating textarea:focus~label,
        .form-floating textarea:not(:placeholder-shown)~label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700;
            color: var(--px-text-label);
        }

        .form-floating textarea:focus {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.18rem var(--px-primary-focus);
        }

        .static-label-inside-radio {
            position: absolute;
            left: var(--input-padding-x);
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            color: var(--px-text-static);
            font-size: var(--base-font);
            font-family: inherit;
            font-weight: 700;
            pointer-events: none;
            z-index: 2;
            background: transparent;
            /* visually match floating label style */
            /* mimic .form-floating label */
        }

        .input-group-row {
            /* ...existing code... */
        }

        .input-group-row label {
            /* ...existing code... */
            margin-left: 0;
        }

        @media (max-width: 600px) {
            .static-label-inside-radio {
                font-size: 0.75rem;
                left: 0.5rem;
            }

            .input-group-row {
                padding-left: 0 !important;
            }
        }

        /* --- Fieldset Style (alternative to form-floating) --- */
        fieldset.input-fieldset {
            position: relative;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            padding: 1.1rem var(--input-padding-x) 0.3rem;
            /* match form-floating input padding */
            margin: 0 0 0.4rem 0;
            background-color: #fff;
            min-height: var(--input-height);
            height: auto;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        fieldset.input-fieldset:focus-within {
            border-color: var(--px-primary);
            box-shadow: 0 0 0 0.18rem var(--px-primary-focus);
            outline: none;
        }

        fieldset.input-fieldset legend {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            padding: 0.8rem 0;
            margin: 0;
            transform: scale(0.8) translateY(-0.7rem);
            transform-origin: 0 0;
            font-size: var(--base-font);
            font-weight: 700;
            color: var(--px-text-label);
            width: auto;
            pointer-events: none;
        }

        fieldset.input-fieldset .input-group-row,
        fieldset.input-fieldset .input-group-checkbox {
            border: none;
            background: transparent;
            padding: 0;
            margin: 0;
            min-height: unset;
            height: auto;
            width: 100%;
        }

        /* --- Checkbox Dropdown Style --- */
        .dropdown-checkbox-wrapper {
            position: relative;
            width: 100%;
        }

        .dropdown-checkbox-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: var(--input-height);
            padding: 0 var(--input-padding-x);
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            /* font-weight: 700; */
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            cursor: pointer;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .dropdown-checkbox-btn:hover,
        .dropdown-checkbox-btn:focus {
            border-color: var(--px-primary);
            outline: 0;
        }

        .dropdown-checkbox-btn::after {
            content: "";
            width: 10px;
            height: 8px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            transition: transform 0.2s;
        }

        .dropdown-checkbox-wrapper.open .dropdown-checkbox-btn::after {
            transform: rotate(180deg);
        }

        .dropdown-checkbox-content {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 10;
            background: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.35rem;
            margin-top: 0.2rem;
            box-shadow: var(--px-shadow);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            padding: 0.5rem 0;
        }

        .dropdown-checkbox-wrapper.open .dropdown-checkbox-content {
            display: block;
        }

        .dropdown-checkbox-item {
            display: flex;
            align-items: center;
            padding: 0.4rem var(--input-padding-x);
            cursor: pointer;
            font-size: var(--base-font);
            font-weight: 400;
            color: var(--px-text-main);
            transition: background-color 0.2s;
            margin: 0;
        }

        .dropdown-checkbox-item:hover {
            background-color: var(--px-bg);
        }

        .dropdown-checkbox-item input[type="checkbox"] {
            margin: 0 0.5rem 0 0;
            width: 1.1em;
            height: 1.1em;
            accent-color: var(--px-primary);
            cursor: pointer;
        }

        .readonly-style,
        input[readonly],
        textarea[readonly],
        select[disabled] {
            background-color: #f8f9fb !important;
            color: #000000 !important;
            cursor: not-allowed !important;
            opacity: 1 !important;
            border-style: dashed !important;        }

        .header-message {
            padding: 0.5rem 1rem;
            border-radius: 0.3rem;
            font-weight: 700;
            font-size: 1.0rem;
            grid-column: span 12;
            margin-bottom: 1rem;
            text-align: center;
        }
        .header-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .header-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .header-message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .delete-confirmation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .delete-confirmation-overlay.show {
            display: flex;
        }

        .delete-confirmation-dialog {
            background: #fff;
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .delete-confirmation-icon {
            width: 60px;
            height: 60px;
            background-color: #f33923;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: #fff;
        }

        .delete-confirmation-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #232e3e;
            margin-bottom: 0.5rem;
        }

        .delete-confirmation-message {
            font-size: 0.82rem;
            color: #5e6e82;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .delete-confirmation-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .delete-btn-cancel {
            background: #fff;
            border: 1px solid #d8e2ef;
            color: #5e6e82;
            padding: 0.5rem 1.5rem;
            border-radius: 0.3rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }

        .delete-btn-cancel:hover {
            background: #f9fafd;
        }

        .delete-btn-confirm {
            background: #f33923;
            border: 1px solid #f33923;
            color: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 0.3rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }

        .delete-btn-confirm:hover {
            background: #d42c1a;
            border-color: #d42c1a;
        }
    </style>
</head>

<body>
    <div id="headerMessage" class="header-message" style="display: none;"></div>
    <div class="container">
        <div class="header-flex">
            <div class="header-left">
                <h2>LEAD - ADD</h2>
            </div>
            <div>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="enableEdit()">EDIT</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="confirmDelete()">DELETE</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="requiredAllFields()">REQUIRED</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="invalidAllFields()">INVALID</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="customErrorAllFields()">CUSTOM ERROR</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="setAllReadOnly()">READ ONLY</button>
                <button class="btn btn-outline" style="margin-right: 0.4rem;" onclick="closeParentPopup()">CANCEL</button>
                <button class="btn btn-primary" onclick="handleSave()">SAVE</button>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <div id="headerMessage" class="header-message" style="display: none;"></div>
            </div>
            <div class="section-divider">LEAD INFO</div>
            <div class="row">
                <div class="form-floating col-32">
                    <input type="text" class="readonly-field" value="(AUTO ID)" readonly placeholder=" "><label>Lead
                        ID</label>
                </div>
                <div class="form-floating col-32">
                    <select id="status" onchange="checkValue(this)">
                        <option value="NEW">New</option>
                        <option value="CON">Contacted</option>
                        <option value="QUAL">Qualified</option>
                        <option value="LOST">Lost</option>
                    </select><label>Status</label>
                    <div id="status-error" class="error-text"></div>
                </div>
                <div class="form-floating col-32">
                    <select id="priority" onchange="checkValue(this)">
                        <option value="N">Normal</option>
                        <option value="M">Medium</option>
                        <option value="H">High</option>
                    </select><label>Priority</label>
                    <div id="priority-error" class="error-text"></div>
                </div>
                <div class="form-floating col-32">
                    <select id="branch" value="" onchange="this.setAttribute('value', this.value)">
                        <option value=""></option>
                        <option value="Glenmarie">Glenmarie HQ</option>
                        <option value="ShahAlam">Shah Alam Branch</option>
                    </select><label>Sales Outlet </label>
                    <div id="branch-error" class="error-text"></div>
                </div>
                <div class="form-floating col-32">

    <div id="deleteConfirmationOverlay" class="delete-confirmation-overlay">
        <div class="delete-confirmation-dialog">
            <div class="delete-confirmation-icon">⚠️</div>
            <div class="delete-confirmation-title">Delete Record?</div>
            <div class="delete-confirmation-message">
                This action cannot be undone. Are you sure you want to permanently delete this record?
            </div>
            <div class="delete-confirmation-buttons">
                <button class="delete-btn-cancel" onclick="cancelDelete()">CANCEL</button>
                <button class="delete-btn-confirm" onclick="confirmDeleteAction()">DELETE</button>
            </div>
        </div>

    <script>
        function checkValue(el) {
            if (el.value !== "") { el.setAttribute('value', el.value); }
            else { el.removeAttribute('value'); }
        }
        window.onload = function () {
            document.querySelectorAll('select, input').forEach(el => checkValue(el));

            // Checkbox Dropdown Logic
            document.querySelectorAll('.dropdown-checkbox-wrapper').forEach(wrapper => {
                const btn = wrapper.querySelector('.dropdown-checkbox-btn');
                const label = wrapper.querySelector('.dropdown-checkbox-label');
                const inputs = wrapper.querySelectorAll('input[type="checkbox"]');

                // Toggle dropdown
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Close others
                    document.querySelectorAll('.dropdown-checkbox-wrapper').forEach(w => {
                        if (w !== wrapper) w.classList.remove('open');
                    });
                    wrapper.classList.toggle('open');
                });

                // Prevent closing when clicking inside content
                wrapper.querySelector('.dropdown-checkbox-content').addEventListener('click', (e) => {
                    e.stopPropagation();
                });

                // Close when clicking outside
                document.addEventListener('click', () => {
                    wrapper.classList.remove('open');
                });

                // Update label on change
                inputs.forEach(input => {
                    input.addEventListener('change', () => {
                        const checked = Array.from(inputs).filter(i => i.checked).map(i => i.value);
                        if (checked.length === 0) {
                            label.textContent = 'Select items...';
                        } else if (checked.length === 1) {
                            label.textContent = checked[0];
                        } else {
                            label.textContent = checked.length + ' items selected';
                        }
                    });
                });
            });

            // Floating label for custom group: add 'filled' class if checked
            document.querySelectorAll('.form-floating.input-group-float').forEach(function (group) {
                function updateFilled() {
                    const inputs = group.querySelectorAll('input[type="radio"],input[type="checkbox"]');
                    let filled = false;
                    inputs.forEach(function (input) {
                        if (input.checked) filled = true;
                    });
                    if (filled) group.classList.add('filled');
                    else group.classList.remove('filled');
                }
                group.addEventListener('change', updateFilled);
                updateFilled();
            });
        };

        // Display header message with specified type
        function showHeaderMessage(message, type = 'info') {
            const headerMsg = document.getElementById('headerMessage');
            headerMsg.textContent = message;
            headerMsg.className = 'header-message ' + type;
            headerMsg.style.display = 'block';
            // Auto-hide after 5 seconds
            setTimeout(() => {
                headerMsg.style.display = 'none';
            }, 5000);
        }

        // Enable edit mode - remove readonly except Lead ID
        function enableEdit() {
            // Remove readonly from inputs
            document.querySelectorAll('input[readonly]').forEach(function(el) {
                // Keep Lead ID readonly
                if (el.id !== 'leadId' && !el.classList.contains('readonly-field')) {
                    el.removeAttribute('readonly');
                    el.classList.remove('readonly-style');
                }
            });

            // Enable selects
            document.querySelectorAll('select[disabled]').forEach(function(el) {
                el.removeAttribute('disabled');
                el.classList.remove('readonly-style');
            });

            // Enable fieldset inputs
            document.querySelectorAll('input[disabled]').forEach(function(el) {
                if (el.type !== 'submit' && el.type !== 'reset' && el.type !== 'button') {
                    el.removeAttribute('disabled');
                    const fieldset = el.closest('fieldset.input-fieldset');
                    if (fieldset) fieldset.classList.remove('readonly-style');
                }
            });

            // Enable dropdown buttons
            document.querySelectorAll('.dropdown-checkbox-btn.readonly-style').forEach(function(btn) {
                btn.classList.remove('readonly-style');
                btn.style.pointerEvents = 'auto';
                btn.setAttribute('tabindex', '0');
                btn.onclick = null; // Remove readonly click handler
            });

            // Remove error highlights and messages from all fields
            document.querySelectorAll('.is-invalid').forEach(function(el) {
                el.classList.remove('is-invalid');
            });

            document.querySelectorAll('.error-text').forEach(function(err) {
                err.style.display = 'none';
                err.textContent = '';
            });

            showHeaderMessage('Form is now in edit mode', 'info');
        }

        // Show custom delete confirmation dialog
        function confirmDelete() {
            const deleteOverlay = document.getElementById('deleteConfirmationOverlay');
            deleteOverlay.classList.add('show');
        }

        // Cancel delete action
        function cancelDelete() {
            const deleteOverlay = document.getElementById('deleteConfirmationOverlay');
            deleteOverlay.classList.remove('show');
        }

        // Confirm delete action
        function confirmDeleteAction() {
            const deleteOverlay = document.getElementById('deleteConfirmationOverlay');
            deleteOverlay.classList.remove('show');
            showHeaderMessage('Record has been deleted successfully', 'success');
            // Add delete logic here
        }

        // Handle save with validation
        function handleSave() {
            let isValid = true;
            const fields = ['fname', 'lname'];
            
            // Validate required fields
            fields.forEach(id => {
                const el = document.getElementById(id);
                const errorEl = document.getElementById(id + '-error');
                if (!el.value || el.value.trim() === "") {
                    el.classList.add('is-invalid');
                    errorEl.style.display = 'block';
                    isValid = false;
                } else {
                    el.classList.remove('is-invalid');
                    errorEl.style.display = 'none';
                }
            });

            if (isValid) {
                showHeaderMessage('Form saved successfully', 'success');
            } else {
                showHeaderMessage('Please fix validation errors before saving', 'error');
            }
        }

        function clearError(el) {
            el.classList.remove('is-invalid');
            document.getElementById(el.id + '-error').style.display = 'none';
        }

        // Helper to highlight all fields and set error message
        function highlightAllFields(errorMsg) {
            // Highlight all normal fields
            document.querySelectorAll('input, select, textarea').forEach(function(el) {
                // Remove .is-invalid from special types (handled by fieldset or dropdown)
                if (
                    el.type === 'file' ||
                    el.type === 'color' ||
                    el.type === 'range'
                ) {
                    el.classList.remove('is-invalid');
                    const fieldset = el.closest('fieldset.input-fieldset');
                    if (fieldset) fieldset.classList.add('is-invalid');
                } else if (el.type === 'radio' || el.type === 'checkbox') {
                    el.classList.remove('is-invalid');
                    const fieldset = el.closest('fieldset.input-fieldset');
                    if (fieldset) fieldset.classList.add('is-invalid');
                } else {
                    el.classList.add('is-invalid');
                }
            });

            // Highlight dropdown-checkbox-btn for dropdown-checkbox-wrapper
            document.querySelectorAll('.dropdown-checkbox-btn').forEach(function(btn) {
                btn.classList.add('is-invalid');
            });

            // Show all error messages if present and set text if errorMsg provided
            document.querySelectorAll('.error-text').forEach(function(err) {
                err.style.display = 'block';
                if (errorMsg !== undefined) err.textContent = errorMsg;
            });
        }

        // Highlight all fields with "Required" message
        function requiredAllFields() {
            highlightAllFields('Required');
        }

        // Highlight all fields with "Invalid" message
        function invalidAllFields() {
            highlightAllFields('Invalid');
        }

        // Highlight all fields with custom error message from const variable
        function customErrorAllFields() {
            const customErrorMsg = 'Custom error: Please check this field!';
            highlightAllFields(customErrorMsg);
        }

        // Close the parent popup iframe if possible
        function closeParentPopup() {
            if (window.parent && typeof window.parent.document !== "undefined") {
                var overlay = window.parent.document.getElementById('popup-overlay');
                if (overlay) {
                    overlay.style.display = 'none';
                }
            }
        }

        // Set all fields as readonly/disabled and apply readonly style
        function setAllReadOnly() {
            // Set all input and textarea as readonly, except buttons
            document.querySelectorAll('input, textarea').forEach(function(el) {
                if (el.type !== 'button' && el.type !== 'submit' && el.type !== 'reset') {
                    // For special types inside fieldset, apply readonly-style to fieldset and disable input
                    if (
                        el.type === 'file' ||
                        el.type === 'color' ||
                        el.type === 'range' ||
                        el.type === 'radio' ||
                        el.type === 'checkbox'
                    ) {
                        el.classList.remove('readonly-style');
                        el.setAttribute('disabled', 'disabled'); // Disable input so user cannot change value
                        const fieldset = el.closest('fieldset.input-fieldset');
                        if (fieldset) fieldset.classList.add('readonly-style');
                    } else {
                        el.setAttribute('readonly', 'readonly');
                        el.classList.add('readonly-style');
                    }
                }
            });
            // Set all select as disabled and apply style
            document.querySelectorAll('select').forEach(function(el) {
                el.setAttribute('disabled', 'disabled');
                el.classList.add('readonly-style');
            });
            // Visually disable dropdown-checkbox-btn, but allow dropdown to open for viewing
            document.querySelectorAll('.dropdown-checkbox-wrapper').forEach(function(wrapper) {
                const btn = wrapper.querySelector('.dropdown-checkbox-btn');
                btn.classList.add('readonly-style');
                btn.setAttribute('tabindex', '0');
                btn.style.pointerEvents = 'auto';
                wrapper.classList.add('open');
                // Prevent toggling/closing in readonly mode
                btn.onclick = function(e) {
                    e.stopPropagation();
                    // Always keep open in readonly
                    wrapper.classList.add('open');
                };
            });
            // Prevent closing dropdown in readonly mode
            document.addEventListener('click', function keepDropdownOpenReadonly(e) {
                document.querySelectorAll('.dropdown-checkbox-wrapper').forEach(function(wrapper) {
                    const btn = wrapper.querySelector('.dropdown-checkbox-btn');
                    if (btn.classList.contains('readonly-style')) {
                        wrapper.classList.add('open');
                    }
                });
            }, { capture: true });
        }
    </script>
