<head>

    <style>
        /* ... (Keep your previous CSS for :root, body, and grid) ... */
        :root {
            --px-bg: #f9fafd;
            --px-card-bg: #ffffff;
            --px-border: #d8e2ef;
            --px-primary: #3874ff;
            --px-primary-focus: rgba(56, 116, 255, 0.2);
            --px-text-main: #232e3e; 
            --px-text-label: #8da1b9; 
            --px-text-static: #5e6e82; 
            --px-placeholder: #a5b0be;
            --px-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            --input-height: 2.7rem;
            --input-padding-x: 0.75rem;
            --grid-gap: 0.8rem;
            --base-font: 0.82rem;
        }

        body { font-family: 'Nunito Sans', sans-serif; background-color: var(--px-bg); color: var(--px-text-main); margin: 0; padding: 1.5rem; }
        .row { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--grid-gap); margin-bottom: 1rem; }
        .col-1 { grid-column: span 1; }
        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-9 { grid-column: span 9; }
        .col-12 { grid-column: span 12; }
        .col-321 { grid-column: span 4; }
        @media (max-width: 992px) { .col-321 { grid-column: span 6; } }
        @media (max-width: 576px) { .col-321 { grid-column: span 12; } }
        .col-432 { grid-column: span 4; }
        @media (max-width: 992px) { .col-432 { grid-column: span 6; } }
        @media (max-width: 576px) { .col-432 { grid-column: span 12; } }

        /* Floating Labels */
           .form-floating { position: relative; }
        .form-floating input, .form-floating select {
            display: block; width: 100%; height: var(--input-height);
            padding: 1.1rem var(--input-padding-x) 0.2rem;
            font-size: var(--base-font); font-family: inherit;
            color: var(--px-text-main); font-weight: 600;
            background-color: #fff; border: 1px solid var(--px-border);
            border-radius: 0.35rem; transition: all 0.2s; box-sizing: border-box;
            appearance: none;
        }

                /* Placeholder Logic */
        .form-floating input::placeholder {
            color: var(--px-placeholder);
            font-style: italic; /* ADDED: Placeholder with italic */
            font-weight: 400;
            opacity: 0; 
            transition: opacity 0.15s;
        }
        .form-floating input:focus::placeholder { opacity: 1; }

        .form-floating select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 10px 8px;
        }

        .form-floating label {
            position: absolute; top: 0; left: var(--input-padding-x);
            height: 100%; padding: 0.8rem 0; pointer-events: none;
            transition: all 0.2s ease-in-out; color: var(--px-text-static);
            font-size: var(--base-font); transform-origin: 0 0;
        }

        /* Fix for date input label */
        .form-floating input[type="date"]:focus ~ label,
        .form-floating input[type="date"]:valid ~ label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700; color: var(--px-text-label);
        }

        .form-floating input:focus ~ label,
        .form-floating input:not(:placeholder-shown) ~ label,
        .form-floating select:focus ~ label,
        .form-floating select:not([value=""]) ~ label {
            transform: scale(0.8) translateY(-0.7rem);
            font-weight: 700; color: var(--px-text-label);
        }

        .form-floating input:focus, .form-floating select:focus {
            border-color: var(--px-primary); outline: 0;
            box-shadow: 0 0 0 0.18rem var(--px-primary-focus);
        }
        /* Table & Sorting */
        .card { background: var(--px-card-bg); border: 1px solid var(--px-border); border-radius: 0.5rem; box-shadow: var(--px-shadow); overflow: hidden; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        table th { background: #f8f9fb; padding: 12px; text-align: left; font-weight: 700; color: var(--px-text-static); text-transform: uppercase; font-size: 0.7rem; border-bottom: 1px solid var(--px-border); }
        
        /* Sortable Header Styles */
        .sortable { cursor: pointer; position: relative; padding-right: 25px !important; white-space: nowrap; }
        .sortable:hover { background: #edf2f9; color: var(--px-primary); }
        .sortable::after { content: "\f0dc"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: 8px; color: #cbd5e0; font-size: 0.65rem; }
        .sortable.asc::after { content: "\f0de"; color: var(--px-primary); }
        .sortable.desc::after { content: "\f0dd"; color: var(--px-primary); }

        table td { padding: 12px; border-bottom: 1px solid var(--px-border); vertical-align: middle; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; min-width: 85px; text-align: center; }
        .status-new { background: #e0f2fe; color: #0369a1; }
        .status-contacted { background: #fef3c7; color: #b45309; }
        .status-qualified { background: #dcfce7; color: #15803d; }
        .status-in-progress { background: #ede9fe; color: #6d28d9; }
        .status-converted { background: #d1fae5; color: #065f46; }
        .status-lost-closed { background: #fee2e2; color: #991b1b; }

        /*.card-footer { padding: 1rem; background: #f8f9fb; border-top: 1px solid var(--px-border); display: flex; justify-content: space-between; align-items: center; }
        .btn-page { background: #fff; border: 1px solid var(--px-border); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
        .object-id-link { color: var(--px-primary); text-decoration: none; font-weight: 700; }*/

        /* Footer Pagination & Page Limit Style */
    .card-footer { 
        padding: 0.8rem 1.2rem; background: #f8f9fb; border-top: 1px solid var(--px-border);
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .footer-left { display: flex; align-items: center; gap: 1rem; }
    .footer-right { display: flex; align-items: center; gap: 0.8rem; }

    .btn-page, .select-page-limit {
        background: #fff; border: 1px solid var(--px-border); 
        padding: 6px 12px; border-radius: 4px; cursor: pointer; 
        font-weight: 700; color: var(--px-text-static); font-size: 0.75rem;
        transition: all 0.2s; height: 32px; box-sizing: border-box;
    }
    .select-page-limit {
        font-weight: 500;
        padding-right: 24px;
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat; background-position: right 8px center; background-size: 8px 6px;
    }
    .btn-page:hover:not(:disabled), .select-page-limit:hover { border-color: var(--px-primary); color: var(--px-primary); }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }

    .object-id-link { color: var(--px-primary); text-decoration: none; font-weight: 700; }
    .monospace-numbers { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

            { id: '21', objectId: '10021', name: 'Siew Mei Wah', vehicleInterest: 'Suzuki Swift Sport', priority: 'High', consultant: 'Sales A', createDate: '2026-02-04', status: 'Qualified' },
            { id: '22', objectId: '10022', name: 'Khairul Anwar', vehicleInterest: 'Suzuki Fronx', priority: 'Low', consultant: 'Sales B', createDate: '2026-02-05', status: 'In Progress' },
            { id: '23', objectId: '10023', name: 'Jessica Wong', vehicleInterest: 'Suzuki Jimny 5-Door', priority: 'Medium', consultant: 'Sales C', createDate: '2026-02-06', status: 'Converted' },
            { id: '24', objectId: '10024', name: 'Kumar A/L Selvam', vehicleInterest: 'Suzuki Swift Sport', priority: 'High', consultant: 'Sales A', createDate: '2026-02-07', status: 'New' },
            { id: '25', objectId: '10025', name: 'Noraini binti Yusof', vehicleInterest: 'Suzuki Jimny 3-Door', priority: 'Medium', consultant: 'Sales B', createDate: '2026-02-08', status: 'Contacted' }
        ];

        class ObjectsController {
            constructor() {
                this.elements = {
                    searchInput: document.getElementById('search-objects'),
                    statusFilter: document.getElementById('filter-status'),
                    itemsPerPage: document.getElementById('items-per-page'),
                    tableBody: document.querySelector('#objectsTable tbody'),
                    summary: document.getElementById('table-summary'),
                    prevBtn: document.getElementById('prev-page'),
                    nextBtn: document.getElementById('next-page'),
                    pageInfo: document.getElementById('page-info'),
                    sortHeaders: document.querySelectorAll('.sortable')
                };

                this.state = {
                    currentPage: 1,
                    itemsPerPage: 10,
                    all: [...mockObjectsData],
                    filtered: [],
                    sortField: 'objectId',
                    sortDirection: 'asc'
                };

                this.bindEvents();
                this.applyFloatingLabelFix();
                this.filter();
            }

            bindEvents() {
                this.elements.searchInput.addEventListener('input', () => this.filter());
                this.elements.statusFilter.addEventListener('change', () => this.filter());
                this.elements.itemsPerPage.addEventListener('change', (e) => {
                    this.state.itemsPerPage = parseInt(e.target.value);
                    this.state.currentPage = 1;
                    this.update();
                });
                this.elements.prevBtn.addEventListener('click', () => { this.state.currentPage--; this.update(); });
                this.elements.nextBtn.addEventListener('click', () => { this.state.currentPage++; this.update(); });

                // Sorting events
                this.elements.sortHeaders.forEach(header => {
                    header.addEventListener('click', () => {
                        const field = header.dataset.sort;
                        if (this.state.sortField === field) {
                            this.state.sortDirection = this.state.sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            this.state.sortField = field;
                            this.state.sortDirection = 'asc';
                        }
                        this.updateSortIcons(header);
                        this.filter(); // Re-filter and sort
                    });
                });
            }

            updateSortIcons(activeHeader) {
                this.elements.sortHeaders.forEach(h => h.classList.remove('asc', 'desc'));
                activeHeader.classList.add(this.state.sortDirection);
            }

            applyFloatingLabelFix() {
                document.querySelectorAll('.form-floating select').forEach(s => {
                    s.addEventListener('change', () => s.setAttribute('value', s.value));
                });
            }

            filter() {
                const search = this.elements.searchInput.value.toLowerCase();
                const status = this.elements.statusFilter.value;

                // 1. Filter
                let result = this.state.all.filter(obj => {
                    const matchesSearch = obj.name.toLowerCase().includes(search) || 
                                          obj.objectId.includes(search) || 
                                          obj.vehicleInterest.toLowerCase().includes(search);
                    const matchesStatus = status ? obj.status === status : true;
                    return matchesSearch && matchesStatus;
                });

                // 2. Sort
                result.sort((a, b) => {
                    let vA = a[this.state.sortField];
                    let vB = b[this.state.sortField];

                    // Numeric sort for Lead ID
                    if (this.state.sortField === 'objectId') {
                        vA = parseInt(vA); vB = parseInt(vB);
                    }

                    if (vA < vB) return this.state.sortDirection === 'asc' ? -1 : 1;
                    if (vA > vB) return this.state.sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                this.state.filtered = result;
                this.state.currentPage = 1;
                this.update();
            }

            update() {
                const start = (this.state.currentPage - 1) * this.state.itemsPerPage;
                const end = start + this.state.itemsPerPage;
                const displayed = this.state.filtered.slice(start, end);
                const total = this.state.filtered.length;
                const totalPages = Math.ceil(total / this.state.itemsPerPage);

                this.elements.tableBody.innerHTML = displayed.map((obj, i) => `
                    <tr>
                        <td>${start + i + 1}</td>
                        <td><a href="#" class="object-id-link">${obj.objectId}</a></td>
                        <td style="font-weight:700">${obj.name}</td>
                        <td>${obj.vehicleInterest}</td>
                        <td>${obj.priority}</td>
                        <td>${obj.consultant}</td>
                        <td class="monospace-numbers">${obj.createDate}</td>
                        <td style="text-align:center">${this.getBadge(obj.status)}</td>
                    </tr>
                `).join('');

                this.elements.summary.textContent = `Showing ${total ? start + 1 : 0}-${Math.min(end, total)} of ${total}`;
                this.elements.pageInfo.textContent = `Page ${this.state.currentPage} of ${totalPages || 1}`;
                this.elements.prevBtn.disabled = this.state.currentPage <= 1;
                this.elements.nextBtn.disabled = this.state.currentPage >= totalPages;
            }

            getBadge(status) {
                const cls = status.toLowerCase().replace(/ \/ /g, '-').replace(/ /g, '-');
                return `<span class="status-badge status-${cls}">${status}</span>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => new ObjectsController());
    </script>
