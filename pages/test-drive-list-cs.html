<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --px-bg: #f9fafd;
        --px-card-bg: #ffffff;
        --px-border: #d8e2ef;
        --px-primary: #3874ff;
        --px-primary-focus: rgba(56, 116, 255, 0.2);
        --px-text-main: #232e3e; 
        --px-text-label: #8da1b9; 
        --px-text-static: #5e6e82; 
        --px-placeholder: #a5b0be;
        --px-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        
        /* Tighter dimensions for efficiency */
        --input-height: 2.5rem; 
        --input-padding-x: 0.6rem; 
        --grid-gap: 0.5rem;
        --base-font: 0.8rem;
    }

    body { 
        font-family: 'Nunito Sans', sans-serif; 
        background-color: var(--px-bg); 
        color: var(--px-text-main); 
        margin: 0; 
        /* Changed from 0.75rem to 5px top, and kept 0.75rem for sides/bottom */
        padding: 0.5rem 0.5rem 0.5rem 0.5rem;
        /*padding: 0.75rem;*/ /* Reduced from 1.5rem */
        -webkit-font-smoothing: antialiased;
    }

    h2 { font-weight: 800; font-size: 1.1rem; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.02em; }

    /* Efficient Grid */
    .row { 
        display: grid; 
        grid-template-columns: repeat(12, 1fr); 
        gap: var(--grid-gap); 
        margin-bottom: 0.75rem;
    }
    .col-6 { grid-column: span 6; }
    @media (max-width: 480px) { .col-6 { grid-column: span 12; } }

    /* Compact Floating Labels */
    .form-floating { position: relative; }
    .form-floating input, .form-floating select {
        display: block; width: 100%; height: var(--input-height);
        padding: 1rem var(--input-padding-x) 0.2rem;
        font-size: var(--base-font); font-family: inherit;
        color: var(--px-text-main); font-weight: 600;
        background-color: #fff; border: 1px solid var(--px-border);
        border-radius: 0.3rem; transition: all 0.2s; box-sizing: border-box;
        appearance: none;
    }

    .form-floating input::placeholder { color: var(--px-placeholder); font-style: italic; font-weight: 400; opacity: 0; }
    .form-floating input:focus::placeholder { opacity: 1; }

    .form-floating select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 9px 7px;
    }

    .form-floating label {
        position: absolute; top: 0; left: var(--input-padding-x);
        height: 100%; display: flex; align-items: center; pointer-events: none;
        transition: all 0.2s ease-in-out; color: var(--px-text-static);
        font-size: var(--base-font); transform-origin: 0 0;
    }

    .form-floating input:focus ~ label,
    .form-floating input:not(:placeholder-shown) ~ label,
    .form-floating select:focus ~ label,
    .form-floating select:not([value=""]) ~ label {
        transform: scale(0.8) translateY(-0.75rem);
        font-weight: 700; color: var(--px-text-label);
    }

    .form-floating input:focus, .form-floating select:focus {
        border-color: var(--px-primary); outline: 0;
        box-shadow: 0 0 0 0.15rem var(--px-primary-focus);
    }

    /* Table Headers & Sorting */
    .card { background: var(--px-card-bg); border: 1px solid var(--px-border); border-radius: 0.4rem; box-shadow: var(--px-shadow); }
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    
    table th { 
        background: #f8f9fb; padding: 10px 8px; text-align: left; 
        font-weight: 700; color: var(--px-text-static); 
        text-transform: uppercase; font-size: 0.65rem; border-bottom: 1px solid var(--px-border); 
        user-select: none;
    }

    /* Base Sortable Class (The Neutral State) */
    .sortable { cursor: pointer; position: relative; padding-right: 22px !important; white-space: nowrap; transition: color 0.2s; }
    .sortable:hover { color: var(--px-primary); }

    /* The "Unsorted" Icon - visible by default */
    .sortable::after { 
        content: "\f0dc"; /* FontAwesome 'sort' (up/down) */
        font-family: "Font Awesome 6 Free"; font-weight: 900; 
        position: absolute; right: 6px; 
        color: #cbd5e0; font-size: 0.6rem; 
        opacity: 0.6;
    }

    /* Active Ascending State */
    .sortable.asc { color: var(--px-primary); }
    .sortable.asc::after { 
        content: "\f0de"; /* FontAwesome 'sort-up' */
        color: var(--px-primary); 
        opacity: 1;
    }

    /* Active Descending State */
    .sortable.desc { color: var(--px-primary); }
    .sortable.desc::after { 
        content: "\f0dd"; /* FontAwesome 'sort-down' */
        color: var(--px-primary); 
        opacity: 1;
    }

    table td { padding: 8px; border-bottom: 1px solid var(--px-border); vertical-align: middle; }
    
    .sortable { cursor: pointer; position: relative; padding-right: 18px !important; white-space: nowrap; }
    .sortable::after { content: "\f0dc"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: 5px; color: #cbd5e0; font-size: 0.6rem; }

    
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; min-width: 75px; text-align: center; }
    .status-new { background: #e0f2fe; color: #0369a1; }
    .status-contacted { background: #fef3c7; color: #b45309; }
    .status-qualified { background: #fff3c5; color: #886f30; }
    .status-in-progress { background: #ede9fe; color: #6d28d9; }
    .status-converted { background: #d1fae5; color: #065f46; }
    .status-lost-closed { background: #fee2e2; color: #991b1b; }
    /* Highlight row on hover */
    table tbody tr {
        transition: background-color 0.15s ease;
    }

    table tbody tr:hover {
        background-color: #f2f5f9 !important; /* Soft blue-grey highlight */
        cursor: default;
    }

    /* Optional: Subtle vertical highlight for the sorted column */
    /* This helps eyes track the data being sorted */
    table td.sorted-column {
        background-color: rgba(56, 116, 255, 0.02);
    }
    
    /* Ensure links remain clickable and visible */
    table tr:hover .object-id-link {
        color: #0046ff;
        text-decoration: underline;
    }

    /* Efficient Footer */
    .card-footer { 
        padding: 0.6rem; background: #f8f9fb; border-top: 1px solid var(--px-border);
        display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    }
    .footer-left, .footer-right { display: flex; align-items: center; gap: 0.4rem; }

    .btn-page, .select-page-limit {
        background: #fff; border: 1px solid var(--px-border); 
        padding: 4px 8px; border-radius: 4px; cursor: pointer; 
        font-weight: 700; color: var(--px-text-static); font-size: 0.7rem;
        transition: all 0.2s; height: 28px; box-sizing: border-box;
    }
    .select-page-limit { font-weight: 500; padding-right: 18px; appearance: none; background-position: right 5px center; }
    .btn-page:disabled { opacity: 0.4; }

    .object-id-link { color: var(--px-primary); text-decoration: underline; font-weight: 500; }
    .monospace-numbers { font-variant-numeric: tabular-nums; }

    /* Mobile Table Summary Adjustment */
    @media (max-width: 600px) {
        #table-summary { display: none; } /* Hide summary on very small screens to save space */
    }

    /* Priority Colors */
    .priority-badge { 
        display: inline-block; padding: 2px 8px; border-radius: 10px; 
        font-size: 0.65rem; font-weight: 900; text-align: center; 
    }/*
    .priority-high { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .priority-medium { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .priority-normal { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }*/
    
    .priority-high { color: #991b1b;}
    .priority-medium { color: #0c7f4d;}
    .priority-normal { color: #616763;}

.btn-add {
    background-color: var(--px-primary);
    color: #fff;
    border: none;
    padding: 0.4rem 0.8rem; /* Smaller padding */
    border-radius: 0.3rem;
    font-weight: 700;
    font-size: 0.7rem; /* Smaller font */
    cursor: pointer;
    transition: background-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
}

.btn-add:hover { background-color: #2b5ecf; }

</style>
</head>

            { id: '25', objectId: '10025', name: 'Noraini binti Yusof', vehicleInterest: 'Suzuki Jimny 3-Door', priority: 'Medium', consultant: 'Sales B', createDate: '2026-02-08', status: 'Contacted' }
        ];

        class ObjectsController {
            constructor() {
                this.elements = {
                    searchInput: document.getElementById('search-objects'),
                    statusFilter: document.getElementById('filter-status'),
                    itemsPerPage: document.getElementById('items-per-page'),
                    tableBody: document.querySelector('#objectsTable tbody'),
                    summary: document.getElementById('table-summary'),
                    prevBtn: document.getElementById('prev-page'),
                    nextBtn: document.getElementById('next-page'),
                    pageInfo: document.getElementById('page-info'),
                    sortHeaders: document.querySelectorAll('.sortable')
                };

                this.state = {
                    currentPage: 1,
                    itemsPerPage: 10,
                    all: [...mockObjectsData],
                    filtered: [],
                    sortField: 'objectId',
                    sortDirection: 'asc'
                };

                this.bindEvents();
                this.applyFloatingLabelFix();
                this.filter();
            }

            bindEvents() {
                this.elements.searchInput.addEventListener('input', () => this.filter());
                this.elements.statusFilter.addEventListener('change', () => this.filter());
                this.elements.itemsPerPage.addEventListener('change', (e) => {
                    this.state.itemsPerPage = parseInt(e.target.value);
                    this.state.currentPage = 1;
                    this.update();
                });
                this.elements.prevBtn.addEventListener('click', () => { this.state.currentPage--; this.update(); });
                this.elements.nextBtn.addEventListener('click', () => { this.state.currentPage++; this.update(); });

                // Sorting events
                this.elements.sortHeaders.forEach(header => {
                    header.addEventListener('click', () => {
                        const field = header.dataset.sort;
                        if (this.state.sortField === field) {
                            this.state.sortDirection = this.state.sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            this.state.sortField = field;
                            this.state.sortDirection = 'asc';
                        }
                        this.updateSortIcons(header);
                        this.filter(); // Re-filter and sort
                    });
                });
            }

            updateSortIcons(activeHeader) {
                this.elements.sortHeaders.forEach(h => h.classList.remove('asc', 'desc'));
                activeHeader.classList.add(this.state.sortDirection);
            }

            applyFloatingLabelFix() {
                document.querySelectorAll('.form-floating select').forEach(s => {
                    s.addEventListener('change', () => s.setAttribute('value', s.value));
                });
            }

            filter() {
                const search = this.elements.searchInput.value.toLowerCase();
                const status = this.elements.statusFilter.value;

                // 1. Filter
                let result = this.state.all.filter(obj => {
                    const matchesSearch = obj.name.toLowerCase().includes(search) || 
                                          obj.objectId.includes(search) || 
                                          obj.vehicleInterest.toLowerCase().includes(search);
                    const matchesStatus = status ? obj.status === status : true;
                    return matchesSearch && matchesStatus;
                });

                // 2. Sort
                result.sort((a, b) => {
                    let vA = a[this.state.sortField];
                    let vB = b[this.state.sortField];

                    // Numeric sort for Lead ID
                    if (this.state.sortField === 'objectId') {
                        vA = parseInt(vA); vB = parseInt(vB);
                    }

                    if (vA < vB) return this.state.sortDirection === 'asc' ? -1 : 1;
                    if (vA > vB) return this.state.sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                this.state.filtered = result;
                this.state.currentPage = 1;
                this.update();
            }

            update() {
                const start = (this.state.currentPage - 1) * this.state.itemsPerPage;
                const end = start + this.state.itemsPerPage;
                const displayed = this.state.filtered.slice(start, end);
                const total = this.state.filtered.length;
                const totalPages = Math.ceil(total / this.state.itemsPerPage);

                this.elements.tableBody.innerHTML = displayed.map((obj, i) => {
                    // Helper to check if a cell belongs to the sorted column
                    const isSorted = (field) => this.state.sortField === field ? 'class="sorted-column"' : '';

                    return `
                        <tr>
                            <td>${start + i + 1}</td>
                            <td ${isSorted('objectId')}><a href="#" class="object-id-link">${obj.objectId}</a></td>
                            <td ${isSorted('name')} style="font-weight:500">${obj.name}</td>
                            <td ${isSorted('vehicleInterest')}>${obj.vehicleInterest}</td>
                            <td ${isSorted('priority')}>${this.getPriorityBadge(obj.priority)}</td>
                            <td ${isSorted('consultant')}>${obj.consultant}</td>
                            <td ${isSorted('createDate')} class="monospace-numbers">${obj.createDate}</td>
                            <td style="text-align:center">${this.getBadge(obj.status)}</td>
                        </tr>
                    `;
                }).join('');
                this.elements.summary.textContent = `Showing ${total ? start + 1 : 0}-${Math.min(end, total)} of ${total}`;
                this.elements.pageInfo.textContent = `Page ${this.state.currentPage} of ${totalPages || 1}`;
                this.elements.prevBtn.disabled = this.state.currentPage <= 1;
                this.elements.nextBtn.disabled = this.state.currentPage >= totalPages;
            }

            getBadge(status) {
                const cls = status.toLowerCase().replace(/ \/ /g, '-').replace(/ /g, '-');
                return `<span class="status-badge status-${cls}">${status}</span>`;
            }

            getPriorityBadge(priority) {
                const cls = priority.toLowerCase();
                return `<span class="priority-badge priority-${cls}">${priority}</span>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => new ObjectsController());
    </script>
