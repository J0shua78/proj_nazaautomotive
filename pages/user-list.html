<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables */
        :root {
            --primary: #2c7be5;
            --secondary: #6e84a3;
            --success: #00a65a;
            --info: #39afd1;
            --warning: #f39c12;
            --danger: #e63757;
            --light: #f9fafd;
            --dark: #12263f;
            --gray: #95aac9;
            --light-gray: #edf2f9;
            --border-color: #e3ebf6;
            --success-dark: #008d4c;
            --warning-dark: #e08e0b;
            --danger-dark: #d33724;
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            padding: 0px 10px 10px 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background-color: white;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
        }

        table th,
        table td {
            padding: 7px 11px;
            text-align: left;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
        }

        table th {
            background-color: var(--light-gray);
            color: var(--dark);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        table td {
            font-size: 13px;
        }

        table th.sortable:hover {
            background-color: rgba(44, 123, 229, 0.06);
        }

        table th.sortable::after {
            content: "\f0dc";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--gray);
            transition: color 0.2s;
        }
        
        table th.sortable.sort-asc::after {
            content: "\f0de";
            color: var(--primary);
        }

        table th.sortable.sort-desc::after {
            content: "\f0dd";
            color: var(--primary);
        }

        table th.sort-asc::after,
        table th.sort-desc::after {
            border: none;
            width: auto;
            height: auto;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        table tr:hover td {
            background-color: rgba(44, 123, 229, 0.03);
        }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            line-height: 1;
            min-width: 65px;
            text-align: center;
        }

        .status-badge.active {
            background-color: rgba(0, 166, 90, 0.1);
            color: var(--success-dark);
            border: 1px solid rgba(0, 166, 90, 0.2);
        }

        .status-badge.inactive {
            background-color: rgba(230, 55, 87, 0.1);
            color: var(--danger-dark);
            border: 1px solid rgba(230, 55, 87, 0.2);
        }

        .status-badge.locked {
            background-color: rgba(243, 156, 18, 0.1);
            color: var(--warning-dark);
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        /* Action Buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            font-size: 11px;
            border-radius: 50%;
            border: none;
            background-color: transparent;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 3px;
            color: var(--gray);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            color: var(--dark);
        }

        .action-btn.view:hover {
            color: var(--success-dark);
        }

        .action-btn.edit:hover {
            color: var(--warning-dark);
        }

        .action-btn.delete:hover {
            color: var(--danger-dark);
        }

        .action-btn.add {
            background-color: var(--primary);
            color: white;
            width: auto;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Filter Controls */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 6px 12px 6px 32px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            background-color: white;
            transition: all 0.2s;
            height: 32px;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(44, 123, 229, 0.25);
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--gray);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: var(--dark);
            font-weight: 500;
        }

        .filter-group select {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            background-color: white;
            min-width: 120px;
            height: 32px;
        }

        /* Card Layout */
        .card {
            background-color: white;
            border-radius: 6px;
            box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
        }

        .card-body {
            padding: 16px;
        }

        .card-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border-color);
            background-color: var(--light-gray);
        }

        /* Pagination Controls */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pagination button {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            background-color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination button.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .page-info {
            padding: 0 8px;
        }

        /* Items Per Page Selector */
        .items-per-page {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .items-per-page label {
            font-size: 13px;
            color: var(--dark);
        }

        .items-per-page select {
            padding: 5px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            height: 32px;
        }

        /* Table Summary */
        .table-summary {
            display: flex;
            align-items: center;
            height: 100%;
            font-size: 13px;
            color: var(--gray);
        }

        /* Iframe Overlay */
        .iframe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }

        .iframe-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 900px;
            height: 90%;
            max-height: 700px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #user-form-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .iframe-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--secondary);
            color: white;
            border: 1px solid var(--secondary);
            width: auto;
            height: auto;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            gap: 4px;
            text-transform: uppercase;
            font-weight: 500;
            transition: all 0.2s;
        }

        .iframe-close:hover {
            background-color: rgba(110, 132, 163, 0.8);
            border-color: rgba(110, 132, 163, 0.8);
        }
        
        .user-id-link {
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }

        .user-id-link:hover {
            color: var(--dark);
        }

        /* Loading Indicator */
        .loading-container {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(44, 123, 229, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-container {
            display: none;
            padding: 12px 16px;
            background-color: rgba(230, 55, 87, 0.1);
            color: var(--danger);
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .filter-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .pagination-container {
                flex-direction: column;
                gap: 12px;
                align-items: flex-end;
            }
            
            .items-per-page {
                order: -1;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 0px 10px 10px 10px;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .table-summary {
                width: 100%;
                justify-content: flex-end;
            }
        }

        .monospace-numbers {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-variant-numeric: tabular-nums;
            white-space: pre;
        }

        .force-pw-change {
            color: var(--warning-dark);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loading-users">
        <div class="loading-spinner"></div>
    </div>

    <div class="error-container" id="error-users"></div>

    <div class="iframe-overlay" id="iframe-overlay">
        <div class="iframe-container">
            <button class="iframe-close" id="iframe-close"><i class="fas fa-times"></i> Close</button>
            <iframe id="user-form-iframe" frameborder="0"></iframe>
        </div>
    </div>

    <div class="filter-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-users" placeholder="Search users...">
        </div>
        <div class="filter-group">
            <label for="filter-status">Status:</label>
            <select id="filter-status">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="locked">Locked</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-role">Role:</label>
            <select id="filter-role">
                <option value="">All Roles</option>
                <!-- Will be populated by JavaScript -->
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <button class="action-btn add" id="add-user">
                <i class="fas fa-plus"></i> Add User
            </button>
            <div class="table-summary" id="table-summary">Showing 0 of 0 users</div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th class="sortable" data-sort="user_id">ID</th>
                            <th class="sortable" data-sort="user_username">Username</th>
                            <th class="sortable" data-sort="user_email">Email</th>
                            <th class="sortable" data-sort="role_name">Role</th>
                            <th class="sortable" data-sort="user_status">Status</th>
                            <th class="sortable" data-sort="user_last_login">Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card-footer">
            <div class="pagination-container">
                <div class="pagination" id="pagination">
                    <button id="prev-page" disabled><i class="fas fa-chevron-left"></i></button>
                    <span class="page-info" id="page-info">Page 1 of 1</span>
                    <button id="next-page" disabled><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="items-per-page">
                    <label for="items-per-page">Show:</label>
                    <select id="items-per-page">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        class UsersController {
            constructor() {
                this.elements = {
                    loading: document.getElementById('loading-users'),
                    error: document.getElementById('error-users'),
                    addUserBtn: document.getElementById('add-user'),
                    searchInput: document.getElementById('search-users'),
                    statusFilter: document.getElementById('filter-status'),
                    roleFilter: document.getElementById('filter-role'),
                    itemsPerPage: document.getElementById('items-per-page'),
                    usersTable: document.getElementById('usersTable'),
                    tableBody: document.querySelector('#usersTable tbody'),
                    tableSummary: document.getElementById('table-summary'),
                    pagination: document.getElementById('pagination'),
                    prevPageBtn: document.getElementById('prev-page'),
                    nextPageBtn: document.getElementById('next-page'),
                    pageInfo: document.getElementById('page-info'),
                    iframeOverlay: document.getElementById('iframe-overlay'),
                    iframeClose: document.getElementById('iframe-close'),
                    userFormIframe: document.getElementById('user-form-iframe')
                };

                this.state = {
                    currentPage: 1,
                    itemsPerPage: 10,
                    totalItems: 0,
                    allUsers: [],
                    filteredUsers: [],
                    displayedUsers: [],
                    sortField: 'user_id',
                    sortDirection: 'asc',
                    roles: []
                };

                this.bindEvents();
                this.initialize();
            }

            bindEvents() {
                // Add user button
                if (this.elements.addUserBtn) {
                    this.elements.addUserBtn.addEventListener('click', () => {
                        this.openUserForm();
                    });
                }

                // Iframe close button
                if (this.elements.iframeClose) {
                    this.elements.iframeClose.addEventListener('click', () => {
                        this.closeUserForm();
                    });
                }

                // Search and filter events
                if (this.elements.searchInput) {
                    this.elements.searchInput.addEventListener('input', () => {
                        this.filterUsers();
                    });
                }

                if (this.elements.statusFilter) {
                    this.elements.statusFilter.addEventListener('change', () => {
                        this.filterUsers();
                    });
                }

                if (this.elements.roleFilter) {
                    this.elements.roleFilter.addEventListener('change', () => {
                        this.filterUsers();
                    });
                }

                if (this.elements.itemsPerPage) {
                    this.elements.itemsPerPage.addEventListener('change', () => {
                        this.state.itemsPerPage = parseInt(this.elements.itemsPerPage.value);
                        this.state.currentPage = 1;
                        this.updateDisplay();
                    });
                }

                // Pagination
                if (this.elements.prevPageBtn) {
                    this.elements.prevPageBtn.addEventListener('click', () => {
                        this.prevPage();
                    });
                }

                if (this.elements.nextPageBtn) {
                    this.elements.nextPageBtn.addEventListener('click', () => {
                        this.nextPage();
                    });
                }

                // Table sorting
                document.querySelectorAll('.sortable').forEach(header => {
                    header.addEventListener('click', () => {
                        const field = header.dataset.sort;
                        if (this.state.sortField === field) {
                            this.state.sortDirection = this.state.sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            this.state.sortField = field;
                            this.state.sortDirection = 'asc';
                        }

                        // Update sort indicators
                        document.querySelectorAll('.sortable').forEach(h => {
                            h.classList.remove('sort-asc', 'sort-desc');
                        });

                        header.classList.add(`sort-${this.state.sortDirection}`);

                        this.filterUsers();
                    });
                });

                // Event delegation for user ID link and action buttons
                if (this.elements.tableBody) {
                    this.elements.tableBody.addEventListener('click', (e) => {
                        const userIdLink = e.target.closest('.user-id-link');
                        const viewBtn = e.target.closest('.action-btn.view');
                        const editBtn = e.target.closest('.action-btn.edit');
                        const deleteBtn = e.target.closest('.action-btn.delete');
                        const row = e.target.closest('tr');
                        const id = row?.dataset.id;
                        
                        if (!id) return;

                        if (userIdLink || viewBtn) {
                            this.openUserForm(id, 'view');
                        } else if (editBtn) {
                            this.openUserForm(id, 'edit');
                        } else if (deleteBtn) {
                            this.deleteUser(id);
                        }
                    });
                }

                // Listen for messages from iframe
                window.addEventListener('message', (e) => {
                    if (e.data.type === 'USER_FORM_CLOSE') {
                        this.closeUserForm();
                    }
                    if (e.data.type === 'USER_FORM_SAVED') {
                        this.closeUserForm();
                        this.loadUsers();
                    }
                });
            }

            openUserForm(id = null, mode = 'add') {
                let url = 'user-form.html';
                if (id) {
                    url += `?id=${id}&mode=${mode}`;
                } else {
                    url += '?mode=add';
                }

                this.elements.userFormIframe.src = url;
                this.elements.iframeOverlay.style.display = 'block';
            }

            closeUserForm() {
                this.elements.iframeOverlay.style.display = 'none';
                this.elements.userFormIframe.src = '';
            }

            async initialize() {
                await this.loadRoles();
                await this.loadUsers();
                // Set initial sort indicator
                const initialHeader = document.querySelector(`.sortable[data-sort="${this.state.sortField}"]`);
                if (initialHeader) {
                    initialHeader.classList.add(`sort-${this.state.sortDirection}`);
                }
            }

            async loadRoles() {
                try {
                    const response = await fetch('http://localhost:3000/web-api/roles-value-label');
                    if (response.ok) {
                        const data = await response.json();
                        this.state.roles = data.roles || [];
                        this.populateRoleFilter();
                    }
                } catch (error) {
                    console.error('Failed to load roles:', error);
                }
            }

            populateRoleFilter() {
                const roleFilter = this.elements.roleFilter;
                if (!roleFilter) return;
                
                // Clear existing options except the first one
                while (roleFilter.options.length > 1) {
                    roleFilter.remove(1);
                }
                
                // Add role options
                this.state.roles.forEach(role => {
                    const option = document.createElement('option');
                    option.value = role.role_id;
                    option.textContent = role.role_name;
                    roleFilter.appendChild(option);
                });
            }

            async loadUsers() {
                try {
                    this.showLoading();
                    const response = await fetch('http://localhost:3000/web-api/users');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.success && data.users) {
                        this.state.allUsers = data.users;
                        this.state.totalItems = data.users.length;
                        this.filterUsers();
                    } else {
                        throw new Error(data.error || 'Failed to load users');
                    }
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            filterUsers() {
                const searchTerm = this.elements.searchInput?.value.toLowerCase() || '';
                const statusFilter = this.elements.statusFilter?.value || '';
                const roleFilter = this.elements.roleFilter?.value || '';

                // Filter users
                this.state.filteredUsers = this.state.allUsers.filter(user => {
                    const matchesSearch =
                        (user.user_username && user.user_username.toLowerCase().includes(searchTerm)) ||
                        (user.user_email && user.user_email.toLowerCase().includes(searchTerm)) ||
                        (user.role_name && user.role_name.toLowerCase().includes(searchTerm));

                    const matchesStatus = statusFilter ? user.user_status === statusFilter : true;
                    const matchesRole = roleFilter ? user.role_id == roleFilter : true;

                    return matchesSearch && matchesStatus && matchesRole;
                });

                // Sort users
                this.state.filteredUsers.sort((a, b) => {
                    let valueA = a[this.state.sortField];
                    let valueB = b[this.state.sortField];

                    // Handle dates
                    if (this.state.sortField === 'user_last_login' || 
                        this.state.sortField === 'created_at' || 
                        this.state.sortField === 'updated_at') {
                        valueA = valueA ? new Date(valueA) : new Date(0);
                        valueB = valueB ? new Date(valueB) : new Date(0);
                    }

                    // Handle case-insensitive string comparison
                    if (typeof valueA === 'string') valueA = valueA.toLowerCase();
                    if (typeof valueB === 'string') valueB = valueB.toLowerCase();

                    // Handle null/undefined values
                    if (valueA == null) valueA = '';
                    if (valueB == null) valueB = '';

                    if (valueA < valueB) return this.state.sortDirection === 'asc' ? -1 : 1;
                    if (valueA > valueB) return this.state.sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                this.state.totalItems = this.state.filteredUsers.length;
                this.state.currentPage = 1;
                this.updateDisplay();
            }

            updateDisplay() {
                // Calculate pagination
                const startIdx = (this.state.currentPage - 1) * this.state.itemsPerPage;
                const endIdx = startIdx + this.state.itemsPerPage;
                this.state.displayedUsers = this.state.filteredUsers.slice(startIdx, endIdx);

                // Update table
                this.renderUsers();

                // Update pagination controls
                this.updatePagination();

                // Update summary
                if (this.elements.tableSummary) {
                    const total = this.state.filteredUsers.length;
                    const start = total > 0 ? startIdx + 1 : 0;
                    const end = Math.min(endIdx, total);
                    this.elements.tableSummary.textContent = `Showing ${start}-${end} of ${total} users`;
                }
            }

            renderUsers() {
                const tbody = this.elements.usersTable?.querySelector('tbody');
                if (!tbody) return;

                tbody.innerHTML = this.state.displayedUsers.map((user, index) => {
                    const rowNum = ((this.state.currentPage - 1) * this.state.itemsPerPage) + index + 1;
                    const lastLogin = user.user_last_login 
                        ? new Date(user.user_last_login).toLocaleString() 
                        : 'Never';
                    
                    const forcePwChange = user.user_force_password_change 
                        ? '<span class="force-pw-change" title="Force password change"><i class="fas fa-exclamation-triangle"></i></span>' 
                        : '';
                    
                    return `
                        <tr data-id="${user.user_id}">
                            <td>${rowNum}</td>
                            <td><a href="#" class="user-id-link">${user.user_id}</a> ${forcePwChange}</td>
                            <td>${user.user_username || 'N/A'}</td>
                            <td>${user.user_email || 'N/A'}</td>
                            <td>${user.role_name || 'N/A'}</td>
                            <td>${this.getStatusBadge(user.user_status)}</td>
                            <td class="monospace-numbers">${lastLogin}</td>
                            <td>
                                <button class="action-btn view" title="View"><i class="fas fa-eye"></i></button>
                                <button class="action-btn edit" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="action-btn delete" title="Delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            updatePagination() {
                if (!this.elements.pagination) return;

                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);

                this.elements.prevPageBtn.disabled = this.state.currentPage <= 1;
                this.elements.nextPageBtn.disabled = this.state.currentPage >= totalPages;

                if (this.elements.pageInfo) {
                    this.elements.pageInfo.textContent = `Page ${this.state.currentPage} of ${totalPages}`;
                }
            }

            prevPage() {
                if (this.state.currentPage > 1) {
                    this.state.currentPage--;
                    this.updateDisplay();
                }
            }

            nextPage() {
                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);
                if (this.state.currentPage < totalPages) {
                    this.state.currentPage++;
                    this.updateDisplay();
                }
            }

            async deleteUser(id) {
                if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                    return;
                }

                try {
                    this.showLoading();
                    const response = await fetch(`/api/users/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // Remove the user from the local data
                        this.state.allUsers = this.state.allUsers.filter(user => user.user_id != id);
                        this.filterUsers();
                    } else {
                        throw new Error(result.error || 'Failed to delete user');
                    }
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            getStatusBadge(status) {
                const badges = {
                    active: 'active',
                    inactive: 'inactive',
                    locked: 'locked'
                };
                const badgeClass = badges[status] || 'inactive';
                const displayText = status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown';
                return `<span class="status-badge ${badgeClass}">${displayText}</span>`;
            }

            showLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'block';
                }
                if (this.elements.error) {
                    this.elements.error.style.display = 'none';
                }
            }

            hideLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'none';
                }
            }

            showError(message) {
                if (this.elements.error) {
                    this.elements.error.textContent = message || 'An unknown error occurred';
                    this.elements.error.style.display = 'block';
                }
            }
        }

        // Initialize controller
        document.addEventListener('DOMContentLoaded', () => {
            new UsersController();
        });
    </script>
</body>
</html>
