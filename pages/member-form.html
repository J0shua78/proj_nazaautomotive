<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Form - Sky Lounge Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c7be5;
            --secondary: #6e84a3;
            --success: #00a65a;
            --info: #39afd1;
            --warning: #f39c12;
            --danger: #e63757;
            --light: #f9fafd;
            --dark: #12263f;
            --dark-light: #4a5a72;
            --gray: #95aac9;
            --light-gray: #edf2f9;
            --border-color: #e3ebf6;
            --success-dark: #008d4c;
            --warning-dark: #e08e0b;
            --danger-dark: #d33724;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: white;
            color: var(--dark);
            padding: 15px;
            font-size: 13px;
            line-height: 1.4;
            height: 100%;
        }

        .form-container {
            max-width: 1000px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .form-header {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            /* Prevent wrapping */
            gap: 10px;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
            white-space: nowrap;
            /* Prevent title from wrapping */
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: auto;
            /* Push title to left */
        }

        .form-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            /* Prevent buttons from shrinking */
        }

        .form-body {
            flex: 1;
            overflow-y: auto;
        }

        .form-section {
            margin-bottom: 15px;
        }

        .form-section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 12px;
        }

        .form-row {
            display: flex;
            margin-bottom: 10px;
            align-items: center;
        }

        .form-label {
            width: 120px;
            font-weight: 500;
            color: var(--dark-light);
            font-size: 12.5px;
        }

        .form-value {
            flex: 1;
            color: var(--dark);
        }

        .form-control {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            min-height: 34px;
        }

        .form-control:disabled {
            background-color: var(--light-gray);
            color: var(--dark);
            border-color: var(--border-color);
        }

        textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
            min-width: 70px;
            text-align: center;
        }

        .status-badge.active {
            background-color: rgba(0, 166, 90, 0.1);
            color: var(--success-dark);
            border: 1px solid rgba(0, 166, 90, 0.2);
        }

        .status-badge.pending {
            background-color: rgba(243, 156, 18, 0.1);
            color: var(--warning-dark);
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        .status-badge.expired {
            background-color: rgba(230, 55, 87, 0.1);
            color: var(--danger-dark);
            border: 1px solid rgba(230, 55, 87, 0.2);
        }

        .loading-container {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 25px;
            height: 25px;
            border: 3px solid rgba(44, 123, 229, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-container {
            display: none;
            padding: 10px 14px;
            background-color: rgba(230, 55, 87, 0.1);
            color: var(--danger);
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .form-header {
                flex-direction: row;
                /* Keep horizontal layout */
                align-items: center;
            }

            .form-title {
                flex: 1;
                min-width: 0;
                /* Allow text truncation */
            }

            .form-actions {
                flex-shrink: 0;
            }
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div class="form-header">
            <h1 class="form-title" id="form-title">Member</h1>
            <div class="form-actions" id="form-actions">
                <!-- Buttons will be added here by JavaScript -->
            </div>
        </div>

        <div class="error-container" id="error-container"></div>
        <div class="loading-container" id="loading-container">
            <div class="loading-spinner"></div>
        </div>

        <div class="form-body" id="form-body">
            <div class="form-section">
                <h3 class="form-section-title">Basic Information</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label class="form-label">Member ID</label>
                        <input type="text" class="form-control" id="member-id" disabled>
                    </div>

                    <div class="form-row">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" id="member-name" required>
                    </div>

                    <div class="form-row">
                        <label class="form-label">Status *</label>
                        <select class="form-control" id="member-status" required>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="expired">Expired</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label class="form-label">Join Date</label>
                        <input type="text" class="form-control" id="join-date" disabled>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="form-section-title">Contact Information</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>

                    <div class="form-row">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="form-section-title">Additional Information</h3>
                <div class="form-row">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" id="notes" rows="3"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/member-form.js"></script>
</body>

</html>
