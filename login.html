<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naza Automotive CRM Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --px-bg: #f9fafd;
            --px-card-bg: #ffffff;
            --px-border: #d8e2ef;
            --px-primary: #3874ff;
            --px-primary-focus: rgba(56, 116, 255, 0.2);
            --px-text-main: #232e3e;
            --px-text-label: #8da1b9;
            --px-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            --input-height: 2.5rem;
            --input-padding-x: 0.6rem;
            --base-font: 0.8rem;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: var(--px-bg);
            color: var(--px-text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Changed to allow footer at bottom */
            align-items: center;
            justify-content: center;
        }
        
        /* Flex wrapper to keep card centered while footer is at bottom */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .login-card {
            background: var(--px-card-bg);
            border: 1px solid var(--px-border);
            border-radius: 0.5rem;
            box-shadow: var(--px-shadow);
            padding: 2rem 2.5rem;
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-logo {
            width: 120px;
            margin-bottom: 1.2rem;
        }
        h2 {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .form-floating {
            position: relative;
            width: 100%;
            margin-bottom: 1rem;
        }
        .form-floating input {
            display: block;
            width: 100%;
            height: var(--input-height);
            padding: 1rem var(--input-padding-x) 0.2rem;
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 600;
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.3rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-floating label {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            height: 100%;
            display: flex;
            align-items: center;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
            color: var(--px-text-label);
            font-size: var(--base-font);
            transform-origin: 0 0;
        }
        .form-floating input:focus ~ label,
        .form-floating input:not(:placeholder-shown) ~ label {
            transform: scale(0.8) translateY(-0.75rem);
            font-weight: 700;
            color: var(--px-text-label);
        }
        .form-floating input:focus {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.15rem var(--px-primary-focus);
        }
        .btn-login {
            width: 100%;
            background-color: var(--px-primary);
            color: #fff;
            border: none;
            padding: 0.7rem 0;
            border-radius: 0.3rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background-color: #2b5ecf; }
        
        /* Footer Styling */
        .login-footer {
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--px-text-label);
            text-align: center;
        }
        .login-footer a {
            color: var(--px-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }

        .login-error {
            color: #f33923;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <img src="images/leftmenulogo.png" alt="Naza Suzuki Logo" class="login-logo">
            <h2>CRM Login</h2>
            <form id="loginForm" autocomplete="off">
                <div class="form-floating">
                    <input type="text" id="username" name="username" placeholder=" " value="admin" required autocomplete="off">
                    <label>Username</label>
                </div>
                <div class="form-floating">
                    <input type="password" id="password" name="password" placeholder=" " value="admin" required autocomplete="off">
                    <label>Password</label>
                </div>
                <div class="login-error" id="loginError">Invalid username or password.</div>
                <button class="btn-login" type="submit">Login</button>
            </form>
        </div>
    </div>

    <footer class="login-footer">
        Developed by <a href="https://www.opensoftsystems.biz" target="_blank">Open Soft Systems</a>.
    </footer>

    <script>
        // Floating label logic
        function updateFloatingLabel(element) {
            if (element.value !== "") {
                element.setAttribute('value', element.value);
            } else {
                element.removeAttribute('value');
            }
        }
        document.querySelectorAll('input').forEach(element => {
            element.addEventListener('input', function() {
                updateFloatingLabel(this);
            });
        });

        // Simple login handler
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            if (username === 'admin' && password === 'admin') {
                window.location.href = 'main-crm.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
