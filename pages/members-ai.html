<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Sky Lounge Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* CSS Variables */
    :root {
        --primary: #2c7be5;
        --secondary: #6e84a3;
        --success: #00a65a;
        --info: #39afd1;
        --warning: #f39c12;
        --danger: #e63757;
        --light: #f9fafd;
        --dark: #12263f;
        --gray: #95aac9;
        --light-gray: #edf2f9;
        --border-color: #e3ebf6;
        --success-dark: #008d4c;
        --warning-dark: #e08e0b;
        --danger-dark: #d33724;
    }

    /* Base Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
        background-color: var(--light);
        color: var(--dark);
        padding: 0px 10px 10px 10px;
        font-size: 14px;
        line-height: 1.5;
    }

    /* Table Styles */
    .table-responsive {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background-color: white;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
    }

    table th,
    table td {
        padding: 7px 11px;
        text-align: left;
        vertical-align: middle;
        border-bottom: 1px solid var(--border-color);
    }

    table th {
        background-color: var(--light-gray);
        color: var(--dark);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        position: relative;
        cursor: pointer;
        user-select: none;
    }

    table td {
        font-size: 13px;
    }

    table th.sortable:hover {
        background-color: rgba(44, 123, 229, 0.06);
    }

    table th.sortable::after {
        content: "\f0dc";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        color: var(--gray);
        transition: color 0.2s;
    }
    
    table th.sortable.sort-asc::after {
        content: "\f0de";
        color: var(--primary);
    }

    table th.sortable.sort-desc::after {
        content: "\f0dd";
        color: var(--primary);
    }

    table th.sort-asc::after,
    table th.sort-desc::after {
        border: none;
        width: auto;
        height: auto;
    }

    table tr:last-child td {
        border-bottom: none;
    }

    table tr:hover td {
        background-color: rgba(44, 123, 229, 0.03);
    }

    /* Status Badges */
    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        min-width: 65px;
        text-align: center;
    }

    .status-badge.active {
        background-color: rgba(0, 166, 90, 0.1);
        color: var(--success-dark);
        border: 1px solid rgba(0, 166, 90, 0.2);
    }

    .status-badge.pending {
        background-color: rgba(243, 156, 18, 0.1);
        color: var(--warning-dark);
        border: 1px solid rgba(243, 156, 18, 0.2);
    }

    .status-badge.expired {
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger-dark);
        border: 1px solid rgba(230, 55, 87, 0.2);
    }

    /* Action Buttons */
    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        font-size: 11px;
        border-radius: 50%;
        border: none;
        background-color: transparent;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 3px;
        color: var(--gray);
    }

    .action-btn:hover {
        transform: translateY(-1px);
        color: var(--dark);
    }

    .action-btn.view:hover {
        color: var(--success-dark);
    }

    .action-btn.edit:hover {
        color: var(--warning-dark);
    }

    .action-btn.delete:hover {
        color: var(--danger-dark);
    }

    .action-btn.add {
        background-color: var(--primary);
        color: white;
        width: auto;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
    }

    /* Filter Controls */
    .filter-container {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 8px 0;
        align-items: center;
    }

    .search-box {
        position: relative;
        flex: 1;
        min-width: 200px;
    }

    .search-box input {
        width: 100%;
        padding: 6px 12px 6px 32px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        transition: all 0.2s;
        height: 32px;
    }

    .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 0.2rem rgba(44, 123, 229, 0.25);
        outline: none;
    }

    .search-box i {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: var(--gray);
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .filter-group label {
        font-size: 13px;
        color: var(--dark);
        font-weight: 500;
    }

    .filter-group select {
        padding: 6px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        min-width: 120px;
        height: 32px;
    }

    /* Card Layout */
    .card {
        background-color: white;
        border-radius: 6px;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
        margin-bottom: 20px;
        overflow: hidden;
    }

    .card-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .card-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--dark);
    }

    .card-body {
        padding: 16px;
    }

    .card-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border-color);
        background-color: var(--light-gray);
    }

    /* Pagination Controls */
    .pagination-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .pagination button {
        padding: 5px 10px;
        border: 1px solid var(--border-color);
        background-color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        min-width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .pagination button.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .pagination button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .page-info {
        padding: 0 8px;
    }

    /* Items Per Page Selector */
    .items-per-page {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .items-per-page label {
        font-size: 13px;
        color: var(--dark);
    }

    .items-per-page select {
        padding: 5px 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        height: 32px;
    }

    /* Table Summary */
    .table-summary {
        display: flex;
        align-items: center;
        height: 100%;
        font-size: 13px;
        color: var(--gray);
    }

    /* Iframe Overlay */
    .iframe-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
    }

    .iframe-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 900px;
        height: 90%;
        max-height: 700px;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    #member-form-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- START OF CHANGES --- */
    .iframe-close {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: var(--secondary);
        color: white;
        border: 1px solid var(--secondary);
        width: auto;
        height: auto;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        gap: 4px;
        text-transform: uppercase;
        font-weight: 500;
        transition: all 0.2s;
    }

    .iframe-close:hover {
        background-color: rgba(110, 132, 163, 0.8);
        border-color: rgba(110, 132, 163, 0.8);
    }
    
    .member-id-link {
        color: var(--primary);
        text-decoration: underline;
        cursor: pointer;
        transition: color 0.2s;
    }

    .member-id-link:hover {
        color: var(--dark);
    }
    /* --- END OF CHANGES --- */


    /* Loading Indicator */
    .loading-container {
        display: none;
        text-align: center;
        padding: 40px 0;
    }

    .loading-spinner {
        display: inline-block;
        width: 30px;
        height: 30px;
        border: 3px solid rgba(44, 123, 229, 0.2);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Error Message */
    .error-container {
        display: none;
        padding: 12px 16px;
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger);
        border-radius: 4px;
        margin-bottom: 16px;
        font-size: 13px;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
        .filter-container {
            flex-direction: column;
            align-items: stretch;
        }
        
        .search-box {
            min-width: 100%;
        }
        
        .pagination-container {
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        
        .items-per-page {
            order: -1;
        }
    }

    @media (max-width: 576px) {
        body {
            padding: 0px 10px 10px 10px;
        }
        
        .card-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        
        .table-summary {
            width: 100%;
            justify-content: flex-end;
        }
    }
</style>
</head>
<body>
    <div class="loading-container" id="loading-members">
        <div class="loading-spinner"></div>
    </div>

    <div class="error-container" id="error-members"></div>

    <div class="iframe-overlay" id="iframe-overlay">
        <div class="iframe-container">
            <button class="iframe-close" id="iframe-close"><i class="fas fa-times"></i> Close</button>
            <iframe id="member-form-iframe" frameborder="0"></iframe>
        </div>
    </div>

    <div class="filter-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-members" placeholder="Search members...">
        </div>
        <div class="filter-group">
            <label for="filter-status">Status:</label>
            <select id="filter-status">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="expired">Expired</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <button class="action-btn add" id="add-member">
                <i class="fas fa-plus"></i> Add Member
            </button>
            <div class="table-summary" id="table-summary">Showing 0 of 0 members</div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th class="sortable" data-sort="memberId">Member ID</th>
                            <th class="sortable" data-sort="name">Name</th>
                            <th class="sortable" data-sort="email">Email</th>
                            <th class="sortable" data-sort="joinDate">Join Date</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
        
        <div class="card-footer">
            <div class="pagination-container">
                <div class="pagination" id="pagination">
                    <button id="prev-page" disabled><i class="fas fa-chevron-left"></i></button>
                    <span class="page-info" id="page-info">Page 1 of 1</span>
                    <button id="next-page" disabled><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="items-per-page">
                    <label for="items-per-page">Show:</label>
                    <select id="items-per-page">
                        <option value="2">2</option>
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // In-line code from memberService.js, members.js, and config.js
        // Note: The mockData import is commented out as the file is not provided.
        // You will need to provide a mockData.js file or replace the mock functions
        // if you want to use the mock data functionality.

        // Combined JavaScript from memberService.js, members.js, and config.js
        
        // js/mockData/members.js (Placeholder)
        const mockMembersData = [
            { id: '1', memberId: 'M001', name: 'Alice Smith', email: 'alice.s@example.com', joinDate: '2023-01-15', status: 'active' },
            { id: '2', memberId: 'M002', name: 'Bob Johnson', email: 'bob.j@example.com', joinDate: '2023-02-20', status: 'pending' },
            { id: '3', memberId: 'M003', name: 'Charlie Brown', email: 'charlie.b@example.com', joinDate: '2023-03-05', status: 'expired' },
            { id: '4', memberId: 'M004', name: 'Diana Prince', email: 'diana.p@example.com', joinDate: '2023-04-10', status: 'active' },
            { id: '5', memberId: 'M005', name: 'Edward Elric', email: 'edward.e@example.com', joinDate: '2023-05-18', status: 'active' },
            { id: '6', memberId: 'M006', name: 'Faye Valentine', email: 'faye.v@example.com', joinDate: '2023-06-25', status: 'pending' },
            { id: '7', memberId: 'M007', name: 'Gojo Satoru', email: 'gojo.s@example.com', joinDate: '2023-07-30', status: 'active' },
            { id: '8', memberId: 'M008', name: 'Harley Quinn', email: 'harley.q@example.com', joinDate: '2023-08-01', status: 'expired' },
            { id: '9', memberId: 'M009', name: 'Ichigo Kurosaki', email: 'ichigo.k@example.com', joinDate: '2023-09-09', status: 'active' },
            { id: '10', memberId: 'M010', name: 'Jotaro Kujo', email: 'jotaro.k@example.com', joinDate: '2023-10-14', status: 'pending' },
            { id: '11', memberId: 'M011', name: 'Levi Ackerman', email: 'levi.a@example.com', joinDate: '2023-11-21', status: 'active' },
            { id: '12', memberId: 'M012', name: 'Mikasa Ackerman', email: 'mikasa.a@example.com', joinDate: '2023-12-05', status: 'active' },
            { id: '13', memberId: 'M013', name: 'Naruto Uzumaki', email: 'naruto.u@example.com', joinDate: '2024-01-01', status: 'active' },
            { id: '14', memberId: 'M014', name: 'Olivia Olson', email: 'olivia.o@example.com', joinDate: '2024-02-10', status: 'pending' },
            { id: '15', memberId: 'M015', name: 'Peter Parker', email: 'peter.p@example.com', joinDate: '2024-03-17', status: 'active' },
            { id: '16', memberId: 'M016', name: 'Queenie Goldstein', email: 'queenie.g@example.com', joinDate: '2024-04-22', status: 'active' },
            { id: '17', memberId: 'M017', name: 'Roronoa Zoro', email: 'roronoa.z@example.com', joinDate: '2024-05-01', status: 'active' },
            { id: '18', memberId: 'M018', name: 'Spike Spiegel', email: 'spike.s@example.com', joinDate: '2024-06-08', status: 'expired' },
            { id: '19', memberId: 'M019', name: 'Trafalgar D. Water Law', email: 'trafalgar.l@example.com', joinDate: '2024-07-13', status: 'active' },
            { id: '20', memberId: 'M020', name: 'Usopp', email: 'usopp@example.com', joinDate: '2024-08-20', status: 'pending' }
        ];

        let members = [...mockMembersData];

        function mockGetMembers() {
            return { success: true, data: members };
        }

        function mockGetMemberDetails(id) {
            const member = members.find(m => m.id === id);
            return { success: !!member, data: member };
        }

        function mockAddMember(memberData) {
            const newMember = { ...memberData, id: String(members.length + 1) };
            members.push(newMember);
            return { success: true, data: newMember };
        }

        function mockUpdateMember(id, memberData) {
            const index = members.findIndex(m => m.id === id);
            if (index !== -1) {
                members[index] = { ...members[index], ...memberData };
                return { success: true, data: members[index] };
            }
            return { success: false, error: 'Member not found' };
        }

        function mockDeleteMember(id) {
            const initialLength = members.length;
            members = members.filter(m => m.id !== id);
            return { success: members.length < initialLength };
        }
        
        // js/config.js
        const config = {
            useMockData: true,
            apiBaseUrl: 'http://localhost:3000/api'
        };

        // js/services/memberService.js
        async function fetchMembers() {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockGetMembers());
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/members`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Network error',
                    fallbackData: mockGetMembers().data
                };
            }
        }

        async function fetchMemberDetails(id) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockGetMemberDetails(id));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/members/${id}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to fetch member details',
                    fallbackData: mockGetMemberDetails(id).data
                };
            }
        }

        async function addMember(memberData) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockAddMember(memberData));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/members`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(memberData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to add member'
                };
            }
        }

        async function updateMember(id, memberData) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockUpdateMember(id, memberData));
                    }, 300);
                    });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/members/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(memberData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to update member'
                };
            }
        }

        async function deleteMember(id) {
            if (config.useMockData) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve(mockDeleteMember(id));
                    }, 300);
                });
            }

            try {
                const response = await fetch(`${config.apiBaseUrl}/members/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return {
                    success: false,
                    error: 'Failed to delete member'
                };
            }
        }

        // js/pages/members.js
        class MembersController {
            constructor() {
                this.elements = {
                    loading: document.getElementById('loading-members'),
                    error: document.getElementById('error-members'),
                    addMemberBtn: document.getElementById('add-member'),
                    searchInput: document.getElementById('search-members'),
                    statusFilter: document.getElementById('filter-status'),
                    itemsPerPage: document.getElementById('items-per-page'),
                    membersTable: document.getElementById('membersTable'),
                    tableBody: document.querySelector('#membersTable tbody'),
                    tableSummary: document.getElementById('table-summary'),
                    pagination: document.getElementById('pagination'),
                    prevPageBtn: document.getElementById('prev-page'),
                    nextPageBtn: document.getElementById('next-page'),
                    pageInfo: document.getElementById('page-info'),
                    iframeOverlay: document.getElementById('iframe-overlay'),
                    iframeClose: document.getElementById('iframe-close'),
                    memberFormIframe: document.getElementById('member-form-iframe')
                };

                this.state = {
                    currentPage: 1,
                    itemsPerPage: 10,
                    totalItems: 0,
                    allMembers: [],
                    filteredMembers: [],
                    displayedMembers: [],
                    sortField: 'memberId',
                    sortDirection: 'asc'
                };

                this.bindEvents();
                this.initialize();
            }

            bindEvents() {
                // Add member button
                if (this.elements.addMemberBtn) {
                    this.elements.addMemberBtn.addEventListener('click', () => {
                        this.openMemberForm();
                    });
                }

                // Iframe close button
                if (this.elements.iframeClose) {
                    this.elements.iframeClose.addEventListener('click', () => {
                        this.closeMemberForm();
                    });
                }

                // Search and filter events
                if (this.elements.searchInput) {
                    this.elements.searchInput.addEventListener('input', () => {
                        this.filterMembers();
                    });
                }

                if (this.elements.statusFilter) {
                    this.elements.statusFilter.addEventListener('change', () => {
                        this.filterMembers();
                    });
                }

                if (this.elements.itemsPerPage) {
                    this.elements.itemsPerPage.addEventListener('change', () => {
                        this.state.itemsPerPage = parseInt(this.elements.itemsPerPage.value);
                        this.state.currentPage = 1;
                        this.updateDisplay();
                    });
                }

                // Pagination
                if (this.elements.prevPageBtn) {
                    this.elements.prevPageBtn.addEventListener('click', () => {
                        this.prevPage();
                    });
                }

                if (this.elements.nextPageBtn) {
                    this.elements.nextPageBtn.addEventListener('click', () => {
                        this.nextPage();
                    });
                }

                // Table sorting
                document.querySelectorAll('.sortable').forEach(header => {
                    header.addEventListener('click', () => {
                        const field = header.dataset.sort;
                        if (this.state.sortField === field) {
                            this.state.sortDirection = this.state.sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            this.state.sortField = field;
                            this.state.sortDirection = 'asc';
                        }

                        // Update sort indicators
                        document.querySelectorAll('.sortable').forEach(h => {
                            h.classList.remove('sort-asc', 'sort-desc');
                        });

                        header.classList.add(`sort-${this.state.sortDirection}`);

                        this.filterMembers();
                    });
                });

                // Event delegation for action buttons and member ID link
                if (this.elements.tableBody) {
                    this.elements.tableBody.addEventListener('click', (e) => {
                        const viewBtn = e.target.closest('.action-btn.view');
                        const editBtn = e.target.closest('.action-btn.edit');
                        const deleteBtn = e.target.closest('.action-btn.delete');
                        const memberIdLink = e.target.closest('.member-id-link');
                        const row = e.target.closest('tr');
                        const id = row?.dataset.id;
                        
                        if (!id) return;

                        if (viewBtn || memberIdLink) {
                            this.openMemberForm(id, 'view');
                        }
                        else if (editBtn) {
                            this.openMemberForm(id, 'edit');
                        }
                        else if (deleteBtn) {
                            this.confirmDelete(id);
                        }
                    });
                }

                // Listen for messages from iframe
                // Add this to the message handler in members.js
                window.addEventListener('message', (e) => {
                    if (e.data.type === 'MEMBER_FORM_CLOSE') {
                        this.closeMemberForm();
                    }
                    if (e.data.type === 'MEMBER_FORM_SAVED') {
                        this.closeMemberForm();
                        this.loadMembers();
                    }
                    if (e.data.type === 'MEMBER_FORM_LOADED') {
                        // Hide the iframe close button when form is loaded
                        this.elements.iframeClose.style.display = 'none';
                    }
                });
            }

            openMemberForm(id = null, mode = 'add') {
                let url = 'member-form.html';
                if (id) {
                    url += `?id=${id}&mode=${mode}`;
                } else {
                    url += '?mode=add';
                }

                this.elements.memberFormIframe.src = url;
                this.elements.iframeOverlay.style.display = 'block';
            }

            closeMemberForm() {
                this.elements.iframeOverlay.style.display = 'none';
                this.elements.memberFormIframe.src = '';
            }

            async initialize() {
                await this.loadMembers();
                // Set initial sort indicator
                const initialHeader = document.querySelector(`.sortable[data-sort="${this.state.sortField}"]`);
                if (initialHeader) {
                    initialHeader.classList.add(`sort-${this.state.sortDirection}`);
                }
            }

            async loadMembers() {
                try {
                    this.showLoading();
                    const { data: members, success } = await fetchMembers();

                    if (success && members) {
                        this.state.allMembers = members;
                        this.state.totalItems = members.length;
                        this.filterMembers();
                    } else {
                        throw new Error('Failed to load members');
                    }
                } catch (error) {
                    this.showError(error.message);
                } finally {
                    this.hideLoading();
                }
            }

            filterMembers() {
                const searchTerm = this.elements.searchInput?.value.toLowerCase() || '';
                const statusFilter = this.elements.statusFilter?.value || '';

                // Filter members
                this.state.filteredMembers = this.state.allMembers.filter(member => {
                    const matchesSearch =
                        member.name.toLowerCase().includes(searchTerm) ||
                        (member.email && member.email.toLowerCase().includes(searchTerm)) ||
                        (member.phone && member.phone.toLowerCase().includes(searchTerm)) ||
                        member.memberId.toLowerCase().includes(searchTerm);

                    const matchesStatus = statusFilter ? member.status === statusFilter : true;

                    return matchesSearch && matchesStatus;
                });

                // Sort members
                this.state.filteredMembers.sort((a, b) => {
                    let valueA = a[this.state.sortField];
                    let valueB = b[this.state.sortField];

                    // Handle dates
                    if (this.state.sortField === 'joinDate') {
                        valueA = new Date(valueA);
                        valueB = new Date(valueB);
                    }

                    // Handle case-insensitive string comparison
                    if (typeof valueA === 'string') valueA = valueA.toLowerCase();
                    if (typeof valueB === 'string') valueB = valueB.toLowerCase();

                    if (valueA < valueB) return this.state.sortDirection === 'asc' ? -1 : 1;
                    if (valueA > valueB) return this.state.sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                this.state.totalItems = this.state.filteredMembers.length;
                this.state.currentPage = 1;
                this.updateDisplay();
            }

            updateDisplay() {
                // Calculate pagination
                const startIdx = (this.state.currentPage - 1) * this.state.itemsPerPage;
                const endIdx = startIdx + this.state.itemsPerPage;
                this.state.displayedMembers = this.state.filteredMembers.slice(startIdx, endIdx);

                // Update table
                this.renderMembers();

                // Update pagination controls
                this.updatePagination();

                // Update summary
                if (this.elements.tableSummary) {
                    const total = this.state.filteredMembers.length;
                    const start = total > 0 ? startIdx + 1 : 0;
                    const end = Math.min(endIdx, total);
                    this.elements.tableSummary.textContent = `Showing ${start}-${end} of ${total} members`;
                }
            }

            renderMembers() {
                const tbody = this.elements.membersTable?.querySelector('tbody');
                if (!tbody) return;

                tbody.innerHTML = this.state.displayedMembers.map((member, index) => {
                    const rowNum = ((this.state.currentPage - 1) * this.state.itemsPerPage) + index + 1;
                    return `
                        <tr data-id="${member.id}">
                            <td>${rowNum}</td>
                            <td><a href="#" class="member-id-link">${member.memberId}</a></td>
                            <td>${member.name}</td>
                            <td>${member.email || 'N/A'}</td>
                            <td>${member.joinDate ? new Date(member.joinDate).toLocaleDateString() : 'N/A'}</td>
                            <td>${this.getStatusBadge(member.status)}</td>
                            <td>
                                <button class="action-btn view" title="View"><i class="fas fa-eye"></i></button>
                                <button class="action-btn edit" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="action-btn delete" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            updatePagination() {
                if (!this.elements.pagination) return;

                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);

                this.elements.prevPageBtn.disabled = this.state.currentPage <= 1;
                this.elements.nextPageBtn.disabled = this.state.currentPage >= totalPages;

                if (this.elements.pageInfo) {
                    this.elements.pageInfo.textContent = `Page ${this.state.currentPage} of ${totalPages}`;
                }
            }

            prevPage() {
                if (this.state.currentPage > 1) {
                    this.state.currentPage--;
                    this.updateDisplay();
                }
            }

            nextPage() {
                const totalPages = Math.ceil(this.state.totalItems / this.state.itemsPerPage);
                if (this.state.currentPage < totalPages) {
                    this.state.currentPage++;
                    this.updateDisplay();
                }
            }

            async confirmDelete(id) {
                const member = this.state.allMembers.find(m => m.id === id);
                if (!member) return;

                if (confirm(`Are you sure you want to delete member ${member.name} (ID: ${member.memberId})?`)) {
                    try {
                        this.showLoading();
                        const { success } = await deleteMember(id);

                        if (success) {
                            await this.loadMembers();
                        } else {
                            throw new Error('Failed to delete member');
                        }
                    } catch (error) {
                        this.showError(error.message);
                    } finally {
                        this.hideLoading();
                    }
                }
            }

            getStatusBadge(status) {
                const badges = {
                    active: 'active',
                    pending: 'pending',
                    expired: 'expired'
                };
                const badgeClass = badges[status] || 'pending';
                const displayText = status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown';
                return `<span class="status-badge ${badgeClass}">${displayText}</span>`;
            }

            showLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'block';
                }
                if (this.elements.error) {
                    this.elements.error.style.display = 'none';
                }
            }

            hideLoading() {
                if (this.elements.loading) {
                    this.elements.loading.style.display = 'none';
                }
            }

            showError(message) {
                if (this.elements.error) {
                    this.elements.error.textContent = message || 'An unknown error occurred';
                    this.elements.error.style.display = 'block';
                }
            }
        }

        // Initialize controller
        document.addEventListener('DOMContentLoaded', () => {
            new MembersController();
        });
    </script>
</body>
</html>
