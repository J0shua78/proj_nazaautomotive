<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Sky Lounge Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* CSS Variables */
    :root {
        --primary: #2c7be5;
        --secondary: #6e84a3;
        --success: #00a65a;
        --info: #39afd1;
        --warning: #f39c12;
        --danger: #e63757;
        --light: #f9fafd;
        --dark: #12263f;
        --gray: #95aac9;
        --light-gray: #edf2f9;
        --border-color: #e3ebf6;
        --success-dark: #008d4c;
        --warning-dark: #e08e0b;
        --danger-dark: #d33724;
    }

    /* Base Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
        background-color: var(--light);
        color: var(--dark);
        padding: 0px 10px 10px 10px;
        font-size: 14px;
        line-height: 1.5;
    }

    /* Table Styles */
    .table-responsive {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background-color: white;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
    }

    table th,
    table td {
        padding: 7px 11px;
        text-align: left;
        vertical-align: middle;
        border-bottom: 1px solid var(--border-color);
    }

    table th {
        background-color: var(--light-gray);
        color: var(--dark);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        position: relative;
        cursor: pointer;
        user-select: none;
    }

    table td {
        font-size: 13px;
    }

    table th.sortable:hover {
        background-color: rgba(44, 123, 229, 0.06);
    }

    table th.sortable::after {
        content: "\f0dc";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        color: var(--gray);
        transition: color 0.2s;
    }
    
    table th.sortable.sort-asc::after {
        content: "\f0de";
        color: var(--primary);
    }

    table th.sortable.sort-desc::after {
        content: "\f0dd";
        color: var(--primary);
    }

    table th.sort-asc::after,
    table th.sort-desc::after {
        border: none;
        width: auto;
        height: auto;
    }

    table tr:last-child td {
        border-bottom: none;
    }

    table tr:hover td {
        background-color: rgba(44, 123, 229, 0.03);
    }

    /* Status Badges */
    .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        min-width: 65px;
        text-align: center;
    }

    .status-badge.active {
        background-color: rgba(0, 166, 90, 0.1);
        color: var(--success-dark);
        border: 1px solid rgba(0, 166, 90, 0.2);
    }

    .status-badge.pending {
        background-color: rgba(243, 156, 18, 0.1);
        color: var(--warning-dark);
        border: 1px solid rgba(243, 156, 18, 0.2);
    }

    .status-badge.expired {
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger-dark);
        border: 1px solid rgba(230, 55, 87, 0.2);
    }

    /* Action Buttons */
    .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        font-size: 11px;
        border-radius: 50%;
        border: none;
        background-color: transparent;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 3px;
        color: var(--gray);
    }

    .action-btn:hover {
        transform: translateY(-1px);
        color: var(--dark);
    }

    .action-btn.view:hover {
        color: var(--success-dark);
    }

    .action-btn.edit:hover {
        color: var(--warning-dark);
    }

    .action-btn.delete:hover {
        color: var(--danger-dark);
    }

    .action-btn.add {
        background-color: var(--primary);
        color: white;
        width: auto;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
    }

    /* Filter Controls */
    .filter-container {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 8px 0;
        align-items: center;
    }

    .search-box {
        position: relative;
        flex: 1;
        min-width: 200px;
    }

    .search-box input {
        width: 100%;
        padding: 6px 12px 6px 32px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        transition: all 0.2s;
        height: 32px;
    }

    .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 0.2rem rgba(44, 123, 229, 0.25);
        outline: none;
    }

    .search-box i {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: var(--gray);
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .filter-group label {
        font-size: 13px;
        color: var(--dark);
        font-weight: 500;
    }

    .filter-group select {
        padding: 6px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        background-color: white;
        min-width: 120px;
        height: 32px;
    }

    /* Card Layout */
    .card {
        background-color: white;
        border-radius: 6px;
        box-shadow: 0 0.5rem 1.2rem rgba(0, 0, 0, 0.03);
        margin-bottom: 20px;
        overflow: hidden;
    }

    .card-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .card-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--dark);
    }

    .card-body {
        padding: 16px;
    }

    .card-footer {
        padding: 10px 16px;
        border-top: 1px solid var(--border-color);
        background-color: var(--light-gray);
    }

    /* Pagination Controls */
    .pagination-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .pagination button {
        padding: 5px 10px;
        border: 1px solid var(--border-color);
        background-color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        min-width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .pagination button.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .pagination button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .page-info {
        padding: 0 8px;
    }

    /* Items Per Page Selector */
    .items-per-page {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .items-per-page label {
        font-size: 13px;
        color: var(--dark);
    }

    .items-per-page select {
        padding: 5px 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        height: 32px;
    }

    /* Table Summary */
    .table-summary {
        display: flex;
        align-items: center;
        height: 100%;
        font-size: 13px;
        color: var(--gray);
    }

    /* Iframe Overlay */
    .iframe-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
    }

    .iframe-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 900px;
        height: 90%;
        max-height: 700px;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    #member-form-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

/* --- START OF CHANGES --- */
    .iframe-close {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: var(--secondary);
        color: white;
        border: 1px solid var(--secondary);
        width: auto;
        height: auto;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        gap: 4px;
        text-transform: uppercase;
        font-weight: 500;
        transition: all 0.2s;
    }

    .iframe-close:hover {
        background-color: rgba(110, 132, 163, 0.8);
        border-color: rgba(110, 132, 163, 0.8);
    }
    /* --- END OF CHANGES --- */


    /* Loading Indicator */
    .loading-container {
        display: none;
        text-align: center;
        padding: 40px 0;
    }

    .loading-spinner {
        display: inline-block;
        width: 30px;
        height: 30px;
        border: 3px solid rgba(44, 123, 229, 0.2);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Error Message */
    .error-container {
        display: none;
        padding: 12px 16px;
        background-color: rgba(230, 55, 87, 0.1);
        color: var(--danger);
        border-radius: 4px;
        margin-bottom: 16px;
        font-size: 13px;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
        .filter-container {
            flex-direction: column;
            align-items: stretch;
        }
        
        .search-box {
            min-width: 100%;
        }
        
        .pagination-container {
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }
        
        .items-per-page {
            order: -1;
        }
    }

    @media (max-width: 576px) {
        body {
            padding: 0px 10px 10px 10px;
        }
        
        .card-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        
        .table-summary {
            width: 100%;
            justify-content: flex-end;
        }
    }
</style>
</head>
<body>
    <!-- Loading Indicator -->
    <div class="loading-container" id="loading-members">
        <div class="loading-spinner"></div>
    </div>

    <!-- Error Message -->
    <div class="error-container" id="error-members"></div>

    <!-- Iframe Overlay -->
    <div class="iframe-overlay" id="iframe-overlay">
        <div class="iframe-container">
            <button class="iframe-close" id="iframe-close"><i class="fas fa-times"></i> Close</button>
            <iframe id="member-form-iframe" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Filter Controls -->
    <div class="filter-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-members" placeholder="Search members...">
        </div>
        <div class="filter-group">
            <label for="filter-status">Status:</label>
            <select id="filter-status">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="expired">Expired</option>
            </select>
        </div>
    </div>

    <!-- Members Table -->
    <div class="card">
        <div class="card-header">
            <button class="action-btn add" id="add-member">
                <i class="fas fa-plus"></i> Add Member
            </button>
            <div class="table-summary" id="table-summary">Showing 0 of 0 members</div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th class="sortable" data-sort="memberId">Member ID</th>
                            <th class="sortable" data-sort="name">Name</th>
                            <th class="sortable" data-sort="email">Email</th>
                            <th class="sortable" data-sort="joinDate">Join Date</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Footer with Pagination -->
        <div class="card-footer">
            <div class="pagination-container">
                <div class="pagination" id="pagination">
                    <button id="prev-page" disabled><i class="fas fa-chevron-left"></i></button>
                    <span class="page-info" id="page-info">Page 1 of 1</span>
                    <button id="next-page" disabled><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="items-per-page">
                    <label for="items-per-page">Show:</label>
                    <select id="items-per-page">
                        <option value="2">2</option>
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/members.js"></script>
</body>
</html>
