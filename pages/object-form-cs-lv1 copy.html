<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix CRM - Add Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --px-bg: #f9fafd;
            --px-card-bg: #ffffff;
            --px-border: #d8e2ef;
            --px-primary: #3874ff;
            --px-primary-focus: rgba(56, 116, 255, 0.25);
            --px-text-main: #232e3e;
            --px-text-label: #5e6e82;
            --px-placeholder: #9da9bb;
            --px-danger: #f33923;
            --px-shadow: 0 7px 14px 0 rgba(0, 0, 0, 0.05);
            --input-padding-x: 0.9rem;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: var(--px-bg);
            color: var(--px-text-main);
            margin: 0;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h2 { font-weight: 800; font-size: 1.5rem; margin: 0; }

        .card {
            background: var(--px-card-bg);
            border: 1px solid var(--px-border);
            border-radius: 0.5rem;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--px-shadow);
        }
        
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }

        .form-floating {
            position: relative;
            margin-bottom: 1.25rem;
        }

        /* Input & Select Styling for Safari Consistency */
        .form-floating input, 
        .form-floating select {
            display: block;
            width: 100%;
            height: 3.5rem;
            padding: 1rem var(--input-padding-x);
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--px-text-main);
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.375rem;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
            
            /* Remove Safari default styling */
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        /* Custom Arrow for Select (Safari Fix) */
        .form-floating select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem;
        }

        /* Placeholder Logic: Hidden by default, visible on focus */
        .form-floating input::placeholder {
            color: var(--px-placeholder);
            opacity: 0; 
            transition: opacity 0.2s;
        }
        .form-floating input:focus::placeholder {
            opacity: 1;
        }

        .form-floating label {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            height: 100%;
            padding: 1.1rem 0;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
            color: var(--px-text-label);
            font-size: 0.95rem;
            transform-origin: 0 0;
        }

        /* Floating Animation */
        .form-floating input:focus ~ label,
        .form-floating input:not(:placeholder-shown) ~ label,
        .form-floating select:focus ~ label,
        .form-floating select:not([value=""]) ~ label {
            transform: scale(0.82) translateY(-0.75rem);
            opacity: 1;
            font-weight: 700;
        }

        .form-floating input:focus, .form-floating select:focus {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.25rem var(--px-primary-focus);
        }

        .form-floating input:focus,
        .form-floating input:not(:placeholder-shown),
        .form-floating select:focus,
        .form-floating select:not([value=""]) {
            padding-top: 1.625rem;
            padding-bottom: 0.625rem;
        }

        /* Error Styles */
        .form-floating.is-invalid input { border-color: var(--px-danger) !important; }
        .error-msg {
            color: var(--px-danger);
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 5px;
            display: none;
        }
        .is-invalid .error-msg { display: block; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .col-12 { grid-column: span 2; }

        .btn {
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            border-radius: 0.375rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .btn-primary { background-color: var(--px-primary); color: #fff; }
        .btn-link { background: none; color: var(--px-text-label); text-decoration: none; margin-right: 1rem; }

        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } .col-12 { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>Add a contact</h2>
        <div>
            <button class="btn btn-link">Cancel</button>
            <button class="btn btn-primary" onclick="validateForm()">Create contact</button>
        </div>
    </div>

    <form id="contactForm" onsubmit="return false;">
        <div class="card">
            <div class="section-title">Personal Information</div>
            <div class="row">
                <div class="form-floating" id="fname-wrapper">
                    <input type="text" id="fname" placeholder="Enter first name" oninput="checkValue(this)">
                    <label for="fname">First Name</label>
                    <div class="error-msg">First name is required</div>
                </div>
                <div class="form-floating" id="lname-wrapper">
                    <input type="text" id="lname" placeholder="Enter last name" oninput="checkValue(this)">
                    <label for="lname">Last Name</label>
                    <div class="error-msg">Last name is required</div>
                </div>
                <div class="form-floating col-12">
                    <input type="email" id="email" placeholder="Email address" oninput="checkValue(this)">
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating">
                    <select id="leadSource" onchange="checkValue(this)">
                        <option value="" hidden></option>
                        <option value="referral">Referral</option>
                        <option value="social">Social Media</option>
                        <option value="adv">Advertisement</option>
                    </select>
                    <label for="leadSource">Lead Source</label>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function checkValue(el) {
        if (el.value !== "") {
            el.setAttribute('value', el.value);
            el.parentElement.classList.remove('is-invalid');
        } else {
            el.removeAttribute('value');
        }
    }

    function validateForm() {
        const fname = document.getElementById('fname');
        const lname = document.getElementById('lname');
        let isValid = true;

        if (!fname.value.trim()) {
            document.getElementById('fname-wrapper').classList.add('is-invalid');
            isValid = false;
        }
        if (!lname.value.trim()) {
            document.getElementById('lname-wrapper').classList.add('is-invalid');
            isValid = false;
        }

        if (isValid) alert("Contact Created Successfully!");
    }
</script>

</body>
</html>
