<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix CRM - Lead Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --px-bg: #f9fafd;
            --px-card-bg: #ffffff;
            --px-border: #d8e2ef;
            --px-primary: #3874ff;
            --px-primary-focus: rgba(56, 116, 255, 0.2);
            --px-text-main: #232e3e; 
            --px-text-label: #8da1b9; 
            --px-text-static: #5e6e82; 
            --px-placeholder: #a5b0be; /* Adjusted for better visibility */
            --px-danger: #f33923;
            --px-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            
            --input-height: 2.7rem;
            --input-padding-x: 0.75rem;
            --grid-gap: 0.6rem;
            --base-font: 0.82rem;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: var(--px-bg);
            color: var(--px-text-main);
            margin: 0;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        h2 { font-weight: 800; font-size: 1.2rem; margin: 0; }

        .card {
            background: var(--px-card-bg);
            border: 1px solid var(--px-border);
            border-radius: 0.4rem;
            padding: 1rem;
            box-shadow: var(--px-shadow);
        }
        
        .section-divider {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--px-text-static);
            letter-spacing: 0.03em;
            margin: 0.5rem 0 0.8rem 0;
            border-bottom: 1px solid #f1f4f8;
            padding-bottom: 0.3rem;
        }

        .row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: var(--grid-gap); 
        }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } .col-12 { grid-column: span 1; } }
        .col-12 { grid-column: span 2; }

        .form-floating {
            position: relative;
        }

        .form-floating input, 
        .form-floating select {
            display: block;
            width: 100%;
            height: var(--input-height);
            padding: 1rem var(--input-padding-x) 0.1rem; 
            font-size: var(--base-font);
            font-family: inherit;
            color: var(--px-text-main);
            font-weight: 600; /* ADDED: Little weight on input value */
            background-color: #fff;
            border: 1px solid var(--px-border);
            border-radius: 0.3rem;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-floating select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%235e6e82' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.6rem center;
            background-size: 10px 8px;
        }

        /* Placeholder Logic */
        .form-floating input::placeholder {
            color: var(--px-placeholder);
            font-style: italic; /* ADDED: Placeholder with italic */
            font-weight: 400;
            opacity: 0; 
            transition: opacity 0.15s;
        }
        .form-floating input:focus::placeholder { opacity: 1; }

        .form-floating label {
            position: absolute;
            top: 0;
            left: var(--input-padding-x);
            height: 100%;
            padding: 0.75rem 0;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
            color: var(--px-text-static); 
            font-size: var(--base-font);
            transform-origin: 0 0;
        }

        .form-floating input:focus ~ label,
        .form-floating input:not(:placeholder-shown) ~ label,
        .form-floating select:focus ~ label,
        .form-floating select:not([value=""]) ~ label {
            transform: scale(0.78) translateY(-0.65rem); 
            font-weight: 700;
            color: var(--px-text-label); 
            opacity: 1;
        }

        .form-floating input:focus, .form-floating select:focus {
            border-color: var(--px-primary);
            outline: 0;
            box-shadow: 0 0 0 0.15rem var(--px-primary-focus);
        }

        .form-floating input:focus,
        .form-floating input:not(:placeholder-shown),
        .form-floating select:focus,
        .form-floating select:not([value=""]) {
            padding-top: 1.1rem; 
            padding-bottom: 0.2rem;
        }

        .readonly-field { background-color: #f8f9fb !important; color: #7a828e !important; font-weight: 400 !important; }

        .btn {
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            padding: 0.45rem 1rem;
            font-size: 0.78rem;
            border-radius: 0.25rem;
            border: 1px solid transparent;
        }
        .btn-primary { background-color: var(--px-primary); color: #fff; }
        .btn-link { background: none; color: var(--px-text-static); text-decoration: none; margin-right: 0.4rem; font-size: 0.75rem;}

    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>Add/Edit Lead</h2>
        <div>
            <button class="btn btn-link">Cancel</button>
            <button class="btn btn-primary" onclick="validateForm()">Save Lead</button>
        </div>
    </div>

    <form id="contactForm" onsubmit="return false;">
        <div class="card">
            <div class="section-divider">Lead Basic Information</div>
            <div class="row">
                <div class="form-floating"><input type="text" class="readonly-field" value="LD-2026-003" readonly placeholder=" "><label>Lead ID</label></div>
                <div class="form-floating"><input type="text" id="fname" placeholder="Enter first name..." oninput="checkValue(this)" value="Siti"><label>First Name</label></div>
                <div class="form-floating"><input type="text" id="lname" placeholder="Enter last name..." oninput="checkValue(this)" value="Aminah"><label>Last Name</label></div>
                
                <div class="form-floating">
                    <select id="ltype" onchange="checkValue(this)" value="Co">
                        <option value=""></option>
                        <option value="Ind">Individual</option>
                        <option value="Co">Company</option>
                    </select><label>Lead Type</label>
                </div>
                <div class="form-floating"><input type="text" id="ic" placeholder="000000-00-0000" oninput="checkValue(this)" value="910505-10-1234"><label>IC Number</label></div>
                <div class="form-floating"><input type="tel" id="phone" placeholder="e.g. 0123456789" oninput="checkValue(this)" value="0129876543"><label>Mobile Number</label></div>
                <div class="form-floating col-12"><input type="email" id="email" placeholder="email@example.com" oninput="checkValue(this)" value="siti.a@company.com"><label>Email Address</label></div>
            </div>

            <div class="section-divider" style="margin-top: 1rem;">Assignment</div>
            <div class="row">
                <div class="form-floating"><input type="text" id="vehicle" placeholder="e.g. Proton X50" oninput="checkValue(this)" value="Honda Civic RS"><label>Interest Vehicle Model</label></div>
                <div class="form-floating"><input type="text" class="readonly-field" value="Sarah Wong (SC-105)" readonly placeholder=" "><label>Sales Consultant</label></div>
            </div>
        </div>
    </form>
</div>

<script>
    function initSelectors() {
        document.querySelectorAll('select, input').forEach(el => {
            if (el.value !== "") {
                el.setAttribute('value', el.value);
            }
        });
    }

    function checkValue(el) {
        if (el.value !== "") {
            el.setAttribute('value', el.value);
        } else {
            el.removeAttribute('value');
        }
    }

    window.onload = initSelectors;
</script>

</body>
</html>
