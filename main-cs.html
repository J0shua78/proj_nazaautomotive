<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naza Automotive | CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 200px;
            --sidebar-bg: #FFFFFF;
            --sidebar-hover: #F1F5F9;
            --accent: #3A6351;
            --text-main: #1E293B;
            --text-dim: #64748B;
            --border-color: #E2E8F0;
        }

        body { display: flex; height: 100vh; margin: 0; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; background: #F8FAFC; }

        /* Sidebar Styling */
        .sidebar { 
            width: var(--sidebar-width); background: var(--sidebar-bg); color: var(--text-main); 
            border-right: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; flex-shrink: 0;
            position: relative; z-index: 1000;
        }
        .sidebar.hidden { margin-left: calc(var(--sidebar-width) * -1); }
        
        .sidebar-header { padding: 24px; font-weight: 700; font-size: 1.1rem; color: var(--accent); border-bottom: 1px solid var(--border-color); }
        .nav-section { padding: 5px 10px; }
        .nav-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #94A3B8; padding: 10px 12px 5px; font-weight: 700; }
        .nav-item { display: flex; align-items: center; padding: 10px 12px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; border-radius: 6px; transition: 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--sidebar-hover); color: var(--text-main); }
        .nav-item.active { background: #E8F5E9; color: var(--accent); font-weight: 600; }
        .nav-item i { margin-right: 12px; width: 16px; opacity: 0.8; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-bar { height: 46px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-color); }

        /* Overlay */
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 999;
        }
        .sidebar-overlay.active { display: block; }

        /* Profile Menu */
        .profile-container { position: relative; }
        .avatar { width: 32px; height: 32px; background: #E2E8F0; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dropdown { position: absolute; right: 0; top: 40px; background: white; width: 180px; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: none; z-index: 50; }
        .dropdown.active { display: block; }
        .dropdown a { display: block; padding: 10px 16px; color: #334155; text-decoration: none; font-size: 0.85rem; }
        .dropdown a:hover { background: #F1F5F9; }

        @media (max-width: 768px) { .sidebar { position: absolute; height: 100%; } }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header" style="padding: 0;">
            <img src="images/leftmenulogo.png" alt="Naza Suzuki Logo" style="width: 100%; max-width: 160px; height: auto; display: block; margin: 0 auto;">
        </div>
        <div class="nav-section">
        <div class="nav-label">CRM</div>
        <a href="#" class="nav-item active" data-page="dashboard-crm.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#" class="nav-item" data-page="pages/lead-list.html"><i class="fas fa-user-edit"></i> Lead</a>
        <a href="#" class="nav-item" data-page="pages/test-drive-list.html"><i class="fas fa-car"></i> Test Drive</a>
        <a href="#" class="nav-item" data-page="pages-template/template-list.html"><i class="fas fa-file-signature"></i> Booking</a>
    </div>

    <div class="nav-section">
        <div class="nav-label">REPORTS</div>
        <a href="#" class="nav-item"><i class="fas fa-poll"></i> Survey</a>
        <a href="#" class="nav-item"><i class="fas fa-comments"></i> Feedback</a>
        <a href="#" class="nav-item"><i class="fas fa-shield-alt"></i> PDPA</a>
    </div>

    <div class="nav-section">
        <div class="nav-label">SETUP</div>
        <a href="#" class="nav-item"><i class="fas fa-user"></i> User</a>
        <a href="#" class="nav-item"><i class="fas fa-user-tag"></i> Role</a>
        <a href="#" class="nav-item"><i class="fas fa-store"></i> Outlet</a>
    </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <i class="fas fa-bars" id="toggle-sidebar" style="cursor: pointer; font-size: 1.2rem; color: #475569;"></i>
            <div class="profile-container" id="profile-trigger">
                <div class="avatar"><i class="fas fa-user-circle" style="color: #64748B;"></i></div>
                <div class="dropdown" id="dropdown">
                    <a href="#">Profile</a>
                    <a href="#">Change Password</a>
                    <a href="#" style="color: #E11D48;">Logout</a>
                </div>
            </div>
        </header>
        <iframe id="main-iframe" src="dashboard-crm.html" style="flex:1; border:none;"></iframe>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('toggle-sidebar');

        function handleResize() {
            if (window.innerWidth <= 768) {
                sidebar.classList.add('hidden');
                overlay.classList.remove('active');
            } else {
                sidebar.classList.remove('hidden');
                overlay.classList.remove('active');
            }
        }

        toggleBtn.onclick = () => {
            sidebar.classList.toggle('hidden');
            if (window.innerWidth <= 768) overlay.classList.toggle('active');
        };

        overlay.onclick = () => {
            sidebar.classList.add('hidden');
            overlay.classList.remove('active');
        };

        window.addEventListener('resize', handleResize);
        window.addEventListener('load', handleResize);

        // Profile Dropdown
        document.getElementById('profile-trigger').onclick = (e) => { 
            e.stopPropagation(); 
            document.getElementById('dropdown').classList.toggle('active'); 
        };
        window.onclick = () => document.getElementById('dropdown').classList.remove('active');

        // Sidebar navigation: load page in iframe
        document.querySelectorAll('.nav-item[data-page]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                // Remove active from all, add to clicked
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                this.classList.add('active');
                // Set iframe src
                document.getElementById('main-iframe').src = this.getAttribute('data-page');
                // Hide sidebar on mobile
                if (window.innerWidth <= 768) {
                    sidebar.classList.add('hidden');
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
